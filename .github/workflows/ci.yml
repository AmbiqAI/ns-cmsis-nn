name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-ci-image:
    uses: ./.github/workflows/build_publish_docker.yml

  unit-tests:
    needs: build-ci-image
    uses: ./.github/workflows/legacy-tester.yml
    with:
      container_image: ${{ needs.build-ci-image.outputs.image_ref }}

  helia-core-tester:
    needs: build-ci-image
    uses: ./.github/workflows/helia-core-tester.yml
    with:
      container_image: ${{ needs.build-ci-image.outputs.image_ref }}