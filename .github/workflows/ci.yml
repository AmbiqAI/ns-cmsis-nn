name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional GHCR image tag override, for example ci-bootstrap-20260402 or v7.22.0
        required: false
        type: string
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  resolve-ci-image:
    runs-on: ubuntu-latest
    outputs:
      container_image: ${{ steps.resolve.outputs.container_image }}

    steps:
      - name: Resolve CI container image
        id: resolve
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          DEFAULT_IMAGE_TAG: ${{ vars.CI_IMAGE_TAG }}
        run: |
          set -euo pipefail

          image_tag="${INPUT_IMAGE_TAG:-}"
          if [[ -z "${image_tag}" ]]; then
            image_tag="${DEFAULT_IMAGE_TAG:-}"
          fi

          if [[ -z "${image_tag}" ]]; then
            echo "CI image tag is not configured." >&2
            echo "Bootstrap the pinned image first by publishing ghcr.io/ambiqai/ns-cmsis-nn-ci:ci-bootstrap-20260402 from tag ci-bootstrap-20260402, then set the repository variable CI_IMAGE_TAG." >&2
            echo "You can also provide workflow_dispatch input image_tag for a one-off run." >&2
            exit 1
          fi

          echo "container_image=ghcr.io/ambiqai/ns-cmsis-nn-ci:${image_tag}" >> "$GITHUB_OUTPUT"

  unit-tests:
    needs: resolve-ci-image
    uses: ./.github/workflows/legacy-tester.yml
    with:
      container_image: ${{ needs.resolve-ci-image.outputs.container_image }}

  helia-core-tester:
    needs: resolve-ci-image
    uses: ./.github/workflows/helia-core-tester.yml
    with:
      container_image: ${{ needs.resolve-ci-image.outputs.container_image }}
