name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ambiqai/ns-cmsis-nn-ci:latest

    strategy:
      fail-fast: false
      matrix:
        core:
          # - cortex-m0
          # - cortex-m4
          # - cortex-m55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify per-channel s16 test data is present
        run: |
          grep -R "fc_per_channel_s16" -n Tests/UnitTest/TestCases/TestData

      - name: Restore tests-downloads cache
        id: cache-downloads
        uses: actions/cache@v4
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}
          restore-keys: |
            ${{ runner.os }}-tests-downloads-

      - name: Download deps (internal cache-checks)
        run: |
          cd Tests/UnitTest
          ./build_and_run_tests.sh -rb

      - name: Build & run tests for ${{ matrix.core }}
        run: |
          cd Tests/UnitTest
          ./build_and_run_tests.sh -q -c ${{ matrix.core }}

      - name: Save tests-downloads cache
        if: steps.cache-downloads.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}

  codegen-tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ambiqai/ns-cmsis-nn-ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install and sync Python deps (CodeGen)
        run: |
          cd Tests/CodeGen
          uv sync

      - name: Setup CodeGen build dependencies
        run: |
          cd Tests/CodeGen
          ./scripts/setup_ci.sh --skip-build-deps

      - name: Run CodeGen full pipeline with JUnit
        run: |
          cd Tests/CodeGen
          uv run helia_core_tester full --report-formats junit

      # - name: Upload JUnit report
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: codegen-junit
      #     path: Tests/CodeGen/artifacts/reports/junit.xml
