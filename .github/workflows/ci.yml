name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        core:
          - cortex-m0
          - cortex-m4
          - cortex-m55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore tests-downloads cache
        id: cache-downloads
        uses: actions/cache@v4
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}
          restore-keys: |
            ${{ runner.os }}-tests-downloads-

      - name: Download deps (internal cache-checks)
        uses: docker://ghcr.io/ambiqai/ns-cmsis-nn-ci:latest
        with:
          args: >
            /bin/sh -c "cd Tests/UnitTest && ./build_and_run_tests.sh -rb"

      - name: Build & run tests for ${{ matrix.core }}
        uses: docker://ghcr.io/ambiqai/ns-cmsis-nn-ci:latest
        with:
          args: >
            /bin/sh -c "cd Tests/UnitTest && ./build_and_run_tests.sh -c ${{ matrix.core }}"

      - name: Save tests-downloads cache
        if: steps.cache-downloads.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}
