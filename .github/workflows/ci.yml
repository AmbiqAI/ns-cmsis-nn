name: CI

on:
  workflow_call:
    inputs:
      trigger-sha:
        required: true
        type: string
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.NS_CMSIS_NN_CI_IMAGE || 'ghcr.io/ambiqai/ns-cmsis-nn-ci:sha-29ba7bce' }}
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        core:
          - cortex-m0
          - cortex-m4
          - cortex-m55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.trigger-sha || github.event.pull_request.head.sha || github.sha }}

      - name: Mark workspace safe
        run: git config --global --add safe.directory "*"

      - name: Preflight runtime tooling
        run: bash scripts/ci_preflight.sh

      - name: Restore tests-downloads cache
        id: cache-downloads
        uses: actions/cache@v4
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}
          restore-keys: |
            ${{ runner.os }}-tests-downloads-

      - name: Download deps
        run: |
          cd Tests/UnitTest
          ./build_and_run_tests.sh -rb

      - name: Preflight GCC tooling
        run: |
          bash scripts/ci_preflight.sh \
            --toolchain gcc \
            --downloads-dir Tests/UnitTest/downloads

      - name: Build and run tests for ${{ matrix.core }}
        run: |
          cd Tests/UnitTest
          ./build_and_run_tests.sh -q -c ${{ matrix.core }}
