name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Cache tests downloads
        uses: actions/cache@v4
        with:
          path: |
            Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-tests-downloads-

      - name: Install and build
        uses: docker://ghcr.io/ambiqai/ns-cmsis-nn-ci:latest
        with:
          args: /bin/sh -c "cd ./Tests/UnitTest && ./build_and_run_tests.sh -r"

      - name: Run unit tests
        uses: docker://ghcr.io/ambiqai/ns-cmsis-nn-ci:latest
        with:
          args: /bin/sh -c "cd ./Tests/UnitTest && ./build_and_run_tests.sh -c cortex-m4,cortex-m55"

      - name: Save tests downloads cache
        uses: actions/cache@v4
        with:
          path: |
            Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt') }}
