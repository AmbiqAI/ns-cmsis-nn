name: Performance Testing CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        core:
          - cortex-m4
          - cortex-m55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore tests-downloads cache
        id: cache-downloads
        uses: actions/cache@v4
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}
          restore-keys: |
            ${{ runner.os }}-tests-downloads-

      - name: Download deps (internal cache-checks)
        uses: docker://ghcr.io/ambiqai/ns-cmsis-nn-ci:latest
        with:
          args: >
            /bin/sh -c "cd Tests/UnitTest && ./build_and_run_tests.sh -rb"

      - name: Build & run performance tests for ${{ matrix.core }}
        uses: docker://ghcr.io/ambiqai/ns-cmsis-nn-ci:latest
        with:
          args: >
            /bin/sh -c "cd Tests/UnitTest && ./run_perf_test_json.sh -q -c ${{ matrix.core }}"
      
      - name: Stash unstaged performance ref file
        run: git stash

      - name: Rebase to get latest changes
        run: |
          git fetch origin
          git rebase origin/main
        shell: bash

      - name: Pop the stashed ref file
        run: git stash pop

      - name: Commit the updated reference performance results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Commit .json file with updated golden performance for ${{ matrix.core }}"
          file_pattern: "./Tests/UnitTest/perf_results_${{ matrix.core }}_ref.json"

      - name: Save tests-downloads cache
        if: steps.cache-downloads.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}
