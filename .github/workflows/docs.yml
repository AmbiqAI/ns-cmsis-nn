# SPDX-License-Identifier: LicenseRef-Ambiq-Apollo-SDK
#
# Builds the heliaCORE MkDocs site and mounts generated Doxygen HTML under /api/.
#
# - On PR: builds the combined site as a sanity check and uploads it as an
#   artifact so reviewers can download a static preview.
# - On push to main: builds the site and (TODO) deploys the combined artifact
#   to GitHub Pages. Versioned docs can be added later after the first deploy
#   target is settled.
#
# The deploy steps are gated behind `if: false` until the Pages target is
# decided (likely after the skeleton PR lands and design/assets are in).

name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "Documentation/Doxygen/**"
      - "Include/**"
      - "Source/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "Documentation/Doxygen/**"
      - "Include/**"
      - "Source/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Generate Doxygen API reference
        uses: Open-CMSIS-Pack/gen-pack-action@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          doxygen-version: 1.9.6
          gen-doc-script: ./Documentation/Doxygen/gen_doc.sh -s
          doc-path: ./Documentation/html
          gh-pages-branch: ""
          gh-pages-deploy: ""

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Mount Doxygen API under /api/
        run: bash docs/scripts/mount_doxygen_html.sh Documentation/html site api

      - name: Verify mounted API entrypoint
        run: test -f site/api/index.html

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: heliacore-docs-site
          path: site/
          retention-days: 14

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-22.04
    # Gated until Pages target + branding are settled. Flip to:
    #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # when ready to go live.
    if: false
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download combined site artifact
        uses: actions/download-artifact@v4
        with:
          name: heliacore-docs-site
          path: site

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy Pages artifact
        uses: actions/deploy-pages@v5
