name: SSoT Contract

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: ns_cmsis_nn.cmake contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run SSoT contract test
        run: cmake -S cmake/tests/ssot_contract -B build/ssot_contract
