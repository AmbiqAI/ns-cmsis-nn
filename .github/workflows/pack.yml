name: Build documentation and pack

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  actions: write  

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    name: Generate & attach pack
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Generate pack
        uses: Open-CMSIS-Pack/gen-pack-action@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   
        with:
          doxygen-version: 1.9.6
          packchk-version: 1.4.1
          gen-doc-script: ./Documentation/Doxygen/gen_doc.sh
          doc-path: ./Documentation/html
          gen-pack-script: ./gen_pack.sh --no-preprocess
          gen-pack-output: ./output
          gh-pages-branch: gh-pages

      - name: Get release version
        id: ver
        run: |
          TAG='${{ github.event.release.tag_name }}'
          VERSION="$(printf '%s' "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename pack file
        run: |
          mv ./output/*.pack \
             "./output/ARM.CMSIS-NN.${{ steps.ver.outputs.VERSION }}.pack"

      - name: Upload pack via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ github.event.release.tag_name }}" \
            "./output/ARM.CMSIS-NN.${{ steps.ver.outputs.VERSION }}.pack" \
            --clobber
