name: Build documentation and pack

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [closed]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    name: Generate & attach pack
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'release' ||
            (github.event_name == 'pull_request' &&
             github.event.action == 'closed' &&
             github.event.pull_request.merged == true &&
             (
               contains(github.event.pull_request.labels.*.name, 'autorelease: pending') ||
               contains(github.event.pull_request.labels.*.name, 'autorelease: tagged')  ||
               startsWith(github.event.pull_request.head.ref, 'release-please--')        ||
               (startsWith(github.event.pull_request.title, 'chore(') &&
                contains(github.event.pull_request.title, ': release'))
             ))
          }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Generate pack
        uses: Open-CMSIS-Pack/gen-pack-action@main
        with:
          doxygen-version: 1.9.6
          packchk-version: 1.4.1
          gen-doc-script: ./Documentation/Doxygen/gen_doc.sh
          doc-path: ./Documentation/html
          gen-pack-script: ./gen_pack.sh --no-preprocess
          gen-pack-output: ./output
          gh-pages-branch: gh-pages

      # — only run these on the actual GitHub Release publish event —
      - name: Get release version
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        id: ver
        run: |
          TAG='${{ github.event.release.tag_name }}'
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename pack file
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        run: |
          mv ./output/*.pack \
             ./output/ARM.CMSIS-NN.${{ steps.ver.outputs.VERSION }}.pack

      - name: Upload pack via GitHub CLI
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ github.event.release.tag_name }}" \
            "./output/ARM.CMSIS-NN.${{ steps.ver.outputs.VERSION }}.pack" \
            --clobber
