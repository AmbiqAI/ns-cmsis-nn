name: Build documentation and pack

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    name: Generate & attach pack
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Generate pack
        uses: Open-CMSIS-Pack/gen-pack-action@main
        with:
          doxygen-version: 1.9.6
          packchk-version: 1.4.1
          gen-doc-script: ./Documentation/Doxygen/gen_doc.sh
          doc-path: ./Documentation/html
          gen-pack-script: ./gen_pack.sh --no-preprocess
          gen-pack-output: ./output
          gh-pages-branch: gh-pages

      # — only run these on the actual GitHub Release publish event —
      - name: Get release version
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        id: ver
        run: |
          TAG=${GITHUB_REF#refs/tags/}       # strip refs/tags/
          VERSION=${TAG#v}                   # strip leading "v"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename pack file
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        run: |
          mv ./output/*.pack \
             ./output/ARM.CMSIS-NN.${{ steps.ver.outputs.VERSION }}.pack

      - name: Upload pack via GitHub CLI
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ github.event.release.tag_name }}" \
            ./output/ARM.CMSIS-NN.${{ steps.ver.outputs.VERSION }}.pack \
            --clobber
