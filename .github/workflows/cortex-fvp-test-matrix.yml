            fvp_image_arg: ''
            disable_default_board_args: false
          - key: gcc-m4
            toolchain: GCC
            toolchain_label: GCC@14.3.1
            cpu: cortex-m4
            fvp_bin: FVP_Corstone_SSE-300_Ethos-U55
            fvp_image_arg: ''
            disable_default_board_args: false
          - key: gcc-m55
            toolchain: GCC
            toolchain_label: GCC@14.3.1
            cpu: cortex-m55
            fvp_bin: FVP_Corstone_SSE-300_Ethos-U55
            fvp_image_arg: -a
            disable_default_board_args: false
          - key: ac6-m0
            toolchain: AC6
            toolchain_label: AC6@6.24.0
            cpu: cortex-m0
            fvp_bin: FVP_Corstone_SSE-300_Ethos-U55
            fvp_image_arg: ''
            disable_default_board_args: false
          - key: ac6-m4
            toolchain: AC6
            toolchain_label: AC6@6.24.0
            cpu: cortex-m4
            fvp_bin: FVP_Corstone_SSE-300_Ethos-U55
            fvp_image_arg: ''
            disable_default_board_args: false
          - key: ac6-m55
            toolchain: AC6
            toolchain_label: AC6@6.24.0
            cpu: cortex-m55
            fvp_bin: FVP_Corstone_SSE-300_Ethos-U55
            fvp_image_arg: -a
            disable_default_board_args: false

    env:
      INTEGER_TESTS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.integer_tests || 'all' }}
      CMSIS_PACK_ROOT: ${{ github.workspace }}/Tests/UnitTest/downloads
      INTEGER_BUILD_ROOT: ${{ github.workspace }}/.ci-tmp/cmsis-nn-integer-fvp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log selected container image
        shell: bash
        run: |
          {
            echo "### Job container image"
            echo "- selected image: \`${{ needs.resolve-container-image.outputs.container_image }}\`"
            echo "- source: \`${{ needs.resolve-container-image.outputs.resolved_from }}\`"
            if [[ -n "${{ needs.resolve-container-image.outputs.release_tag }}" ]]; then
