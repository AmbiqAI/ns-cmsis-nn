name: Cortex FVP Test Matrix

on:
  workflow_call:
    inputs:
      container_image:
        description: Optional container image override for the test jobs. When unset, the workflow tries the latest release-tagged image and falls back to :latest.
        required: false
        default: ''
        type: string
      float_tests:
        description: Comma-separated float test families to run
        required: false
        default: all
        type: string
      float_dtypes:
        description: Comma-separated float dtype list
        required: false
        default: f32,f16
        type: string
      integer_tests:
        description: Comma-separated integer test targets to run
        required: false
        default: all
        type: string
      variants:
        description: Comma-separated variant keys to build
        required: false
        default: all
        type: string
      optimization:
        description: Value forwarded to CMSIS_OPTIMIZATION_LEVEL for library variants
        required: false
        default: -Ofast
        type: string
  workflow_dispatch:
    inputs:
      container_image:
        description: Optional container image override for the test jobs. When unset, the workflow tries the latest release-tagged image and falls back to :latest.
        required: false
        default: ''
      float_tests:
        description: Comma-separated float test families to run
        required: false
        default: all
      float_dtypes:
        description: Comma-separated float dtype list
        required: false
        default: f32,f16
      integer_tests:
        description: Comma-separated integer test targets to run
        required: false
        default: all
      variants:
        description: Comma-separated variant keys to build
        required: false
        default: all
      optimization:
        description: Value forwarded to CMSIS_OPTIMIZATION_LEVEL for library variants
        required: false
        default: -Ofast

permissions:
  contents: read
  packages: read

jobs:
  resolve-container-image:
    uses: ./.github/workflows/resolve-ci-image.yml
    with:
      container_image: ${{ inputs.container_image }}

  float-fvp:
    name: Float FVP ${{ matrix.toolchain_label }} ${{ matrix.cpu }}
    runs-on: ubuntu-latest
    needs: resolve-container-image
    container:
      image: ${{ needs.resolve-container-image.outputs.container_image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: ac6-m55
            toolchain: AC6
            toolchain_label: AC6@6.24.0
            cpu: cortex-m55
            target_type: Corstone-300-FVP
            fvp_bin: FVP_Corstone_SSE-300_Ethos-U55
            fvp_image_arg: -a
            disable_default_board_args: false
          - key: clang-m55
            toolchain: CLANG
            toolchain_label: CLANG@20.1.0
            cpu: cortex-m55
            target_type: Corstone-300-FVP
            fvp_bin: FVP_Corstone_SSE-300_Ethos-U55
            fvp_image_arg: -a
            disable_default_board_args: false

    env:
      FLOAT_TESTS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.float_tests || 'all' }}
      FLOAT_DTYPES: ${{ matrix.float_dtypes || (github.event_name == 'workflow_dispatch' && github.event.inputs.float_dtypes || 'f32,f16') }}
      CMSIS_PACK_ROOT: ${{ github.workspace }}/Tests/UnitTest/downloads

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log selected container image
        shell: bash
        run: |
          {
            echo "### Job container image"
            echo "- selected image: \`${{ needs.resolve-container-image.outputs.container_image }}\`"
            echo "- source: \`${{ needs.resolve-container-image.outputs.resolved_from }}\`"
            if [[ -n "${{ needs.resolve-container-image.outputs.release_tag }}" ]]; then
              echo "- latest release tag: \`${{ needs.resolve-container-image.outputs.release_tag }}\`"
            else
              echo "- latest release tag: _(unavailable)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mark workspace as a safe git directory
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Source vcpkg toolset environment
        shell: bash
        run: |
          ns_cmsis_nn_vcpkg_env="${NS_CMSIS_NN_VCPKG_ENV:-/opt/ns-cmsis-nn/vcpkg-env.json}"

          if [[ ! -f "${ns_cmsis_nn_vcpkg_env}" ]]; then
            workspace_root="${GITHUB_WORKSPACE:-$PWD}"
            config_path="${workspace_root}/vcpkg-configuration.json"
            runner_tmp="${RUNNER_TEMP:-/tmp}"
            vcpkg_root="${VCPKG_ROOT:-${runner_tmp}/ns-cmsis-nn-vcpkg}"
            downloads_root="${VCPKG_DOWNLOADS:-${runner_tmp}/ns-cmsis-nn-vcpkg-downloads}"
            bootstrap_script="${runner_tmp}/ns-cmsis-nn-vcpkg-init.sh"

            if [[ ! -f "${config_path}" ]]; then
              echo "Error: vcpkg configuration file not found: ${config_path}" >&2
              exit 1
            fi

            if ! command -v curl >/dev/null 2>&1; then
              echo "Error: curl is required to bootstrap vcpkg" >&2
              exit 1
            fi

            if [[ "${ns_cmsis_nn_vcpkg_env}" == /opt/ns-cmsis-nn/* ]]; then
              ns_cmsis_nn_vcpkg_env="${runner_tmp}/ns-cmsis-nn-vcpkg-env.json"
            fi

            mkdir -p "${vcpkg_root}" "${downloads_root}" "$(dirname "${ns_cmsis_nn_vcpkg_env}")"
            curl -fsSL https://aka.ms/vcpkg-init.sh -o "${bootstrap_script}"

            export VCPKG_ROOT="${vcpkg_root}"
            export VCPKG_DOWNLOADS="${downloads_root}"

            # shellcheck disable=SC1090
            . "${bootstrap_script}"

            (
              cd "${workspace_root}"
              "${VCPKG_ROOT}/vcpkg" x-update-registry --all
              "${VCPKG_ROOT}/vcpkg" activate \
                --downloads-root="${downloads_root}" \
                --json="${ns_cmsis_nn_vcpkg_env}"
            )
          fi

          if [[ ! -f "${ns_cmsis_nn_vcpkg_env}" ]]; then
            echo "Error: vcpkg env file not found: ${ns_cmsis_nn_vcpkg_env}" >&2
            exit 1
          fi

          jq -r '.paths.PATH[]?' "${ns_cmsis_nn_vcpkg_env}" >> "$GITHUB_PATH"

          # Export the scalar environment entries the Arm vcpkg artifacts
          # define (e.g. AC6_TOOLCHAIN_6_24_0). cbuild needs these toolchain
          # registration variables to resolve the selected compiler; with
          # only PATH exported it reports "no compiler registered".
          jq -r '
            ((.environment // {}) + (.tools // {}))
            | to_entries[]
            | select((.value | type) == "string" and .key != "PATH")
            | "\(.key)=\(.value)"
          ' "${ns_cmsis_nn_vcpkg_env}" >> "$GITHUB_ENV"

      - name: Restore tests-downloads cache
        id: cache-downloads
        uses: actions/cache@v5
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}
          restore-keys: |
            ${{ runner.os }}-tests-downloads-

      - name: Download deps (legacy cache-check path)
        shell: bash
        run: |
          cd Tests/UnitTest
          ./build_and_run_tests.sh -rb

      - name: Save tests-downloads cache
        if: steps.cache-downloads.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}

      - name: Activate Arm tool license
        if: matrix.toolchain == 'AC6'
        uses: ARM-software/cmsis-actions/armlm@v1

      - name: Install float data-generation dependencies
        shell: bash
        run: |
          source Tests/UnitTest/downloads/cmsis_nn_venv/bin/activate
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch

      - name: Install required CMSIS packs
        shell: bash
        run: |
          mkdir -p "${CMSIS_PACK_ROOT}"
          cpackget add "ARM::CMSIS@6.3.0" -R "${CMSIS_PACK_ROOT}" -F --agree-embedded-license
          cpackget add "ARM::Cortex_DFP@1.1.0" -R "${CMSIS_PACK_ROOT}" -F --agree-embedded-license
          cpackget add "ARM::V2M_MPS3_SSE_300_BSP@1.5.0" -R "${CMSIS_PACK_ROOT}" -F --agree-embedded-license
          cpackget add "ARM::CMSIS-Compiler@2.3.0" -R "${CMSIS_PACK_ROOT}" -F --agree-embedded-license

      - name: Register local NS-CMSIS-NN pack
        shell: bash
        run: |
          mkdir -p "${CMSIS_PACK_ROOT}"
          rm -rf "${CMSIS_PACK_ROOT}/.Local"
          cpackget add Ambiq.NS-CMSIS-NN.pdsc -R "${CMSIS_PACK_ROOT}" -F --agree-embedded-license

      - name: Verify float CMSIS component wiring
        shell: bash
        run: python3 scripts/check_float_cmsis_components.py

      - name: Bootstrap Unity test runners
        shell: bash
        working-directory: Tests/UnitTest
        run: |
          source downloads/cmsis_nn_venv/bin/activate
          python3 unittest_targets.py --download-and-generate-test-runners

      - name: Run float CMSIS/FVP regression
        shell: bash
        working-directory: Tests/UnitTest
        run: |
          set +e
          set -o pipefail

          export PATH="$GITHUB_WORKSPACE/Tests/UnitTest/downloads/arm_gcc_download/bin:$PATH"
          if [[ -d "$GITHUB_WORKSPACE/Tests/UnitTest/downloads/corstone300_download/models/Linux64_GCC-9.3" ]]; then
            export PATH="$GITHUB_WORKSPACE/Tests/UnitTest/downloads/corstone300_download/models/Linux64_GCC-9.3:$PATH"
          fi
          if [[ -d "$GITHUB_WORKSPACE/Tests/UnitTest/downloads/corstone300_download/models/Linux64_armv8l_GCC-9.3" ]]; then
            export PATH="$GITHUB_WORKSPACE/Tests/UnitTest/downloads/corstone300_download/models/Linux64_armv8l_GCC-9.3:$PATH"
          fi
          source downloads/cmsis_nn_venv/bin/activate

            fvp_image_args=()
            if [[ -n "${{ matrix.fvp_image_arg }}" ]]; then
              # Keep dash-prefixed values like -a bound to the option for argparse.
              fvp_image_args=("--fvp-image-arg=${{ matrix.fvp_image_arg }}")
            fi

            board_args=()
            if [[ "${{ matrix.disable_default_board_args }}" == "true" ]]; then
              board_args=(--disable-default-board-args)
            fi

            python3 -u run_float_unit_tests.py \
            --tests "${FLOAT_TESTS}" \
            --dtypes "${FLOAT_DTYPES}" \
              --cpu "${{ matrix.cpu }}" \
              --target-type "${{ matrix.target_type }}" \
            --generate \
            --build-cmsis \
            --run-fvp \
            --toolchains "${{ matrix.toolchain }}" \
            --jobs 4 \
            --fvp-timeout 120 \
            --cbuild-packs \
              --fvp-bin "${{ matrix.fvp_bin }}" \
              "${fvp_image_args[@]}" \
              "${board_args[@]}" | tee float_fvp.log

          status=${PIPESTATUS[0]}

          {
            echo "## ${{ matrix.toolchain_label }}"
            echo ""
              echo "- CPU: \`${{ matrix.cpu }}\`"
              echo "- Target Type: \`${{ matrix.target_type }}\`"
            echo "- Tests: \`${FLOAT_TESTS}\`"
            echo "- DTypes: \`${FLOAT_DTYPES}\`"
            echo ""
            echo '```text'
            if grep -q '^Float Unit-Test Summary' float_fvp.log; then
              sed -n '/^Float Unit-Test Summary/,$p' float_fvp.log
            else
              cat float_fvp.log
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "${status}"

      - name: Upload float FVP logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: float-fvp-${{ matrix.key }}
          path: |
            Tests/UnitTest/float_fvp.log
            Tests/UnitTest/cmsis/**/*.log

  integer-fvp:
    name: Integer FVP ${{ matrix.toolchain_label }} ${{ matrix.cpu }}
    runs-on: ubuntu-latest
