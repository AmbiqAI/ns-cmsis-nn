            Tests/UnitTest/integer_fvp.log
            ${{ env.INTEGER_BUILD_ROOT }}/**/*.log

  lib-variants:
    name: Lib Variants ${{ matrix.toolchain_label }} ${{ matrix.cpu }}
    runs-on: ubuntu-latest
    needs: resolve-container-image
    container:
      image: ${{ needs.resolve-container-image.outputs.container_image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: gcc-m0
            toolchain: GCC
            toolchain_label: GCC@14.3.1
            cpu: cortex-m0
            variants: baseline
          - key: gcc-m4
            toolchain: GCC
            toolchain_label: GCC@14.3.1
            cpu: cortex-m4
            variants: baseline,f32
          - key: gcc-m55
            toolchain: GCC
            toolchain_label: GCC@14.3.1
            cpu: cortex-m55
          - key: ac6-m0
            toolchain: AC6
            toolchain_label: AC6@6.24.0
            cpu: cortex-m0
            variants: baseline
          - key: ac6-m4
            toolchain: AC6
            toolchain_label: AC6@6.24.0
            cpu: cortex-m4
            variants: baseline,f32
          - key: ac6-m55
            toolchain: AC6
            toolchain_label: AC6@6.24.0
            cpu: cortex-m55

    env:
      LIB_VARIANTS: ${{ matrix.variants || (github.event_name == 'workflow_dispatch' && github.event.inputs.variants || 'all') }}
      LIB_OPTIMIZATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.optimization || '-Ofast' }}
      LIB_BUILD_ROOT: ${{ github.workspace }}/.ci-tmp/cmsis-nn-lib-variants
      CMSIS_PACK_ROOT: ${{ github.workspace }}/Tests/UnitTest/downloads

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log selected container image
        shell: bash
        run: |
          {
            echo "### Job container image"
            echo "- selected image: \`${{ needs.resolve-container-image.outputs.container_image }}\`"
            echo "- source: \`${{ needs.resolve-container-image.outputs.resolved_from }}\`"
            if [[ -n "${{ needs.resolve-container-image.outputs.release_tag }}" ]]; then
              echo "- latest release tag: \`${{ needs.resolve-container-image.outputs.release_tag }}\`"
            else
              echo "- latest release tag: _(unavailable)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mark workspace as a safe git directory
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Source vcpkg toolset environment
