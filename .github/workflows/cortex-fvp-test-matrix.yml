        run: |
          ns_cmsis_nn_vcpkg_env="${NS_CMSIS_NN_VCPKG_ENV:-/opt/ns-cmsis-nn/vcpkg-env.json}"

          if [[ ! -f "${ns_cmsis_nn_vcpkg_env}" ]]; then
            workspace_root="${GITHUB_WORKSPACE:-$PWD}"
            config_path="${workspace_root}/vcpkg-configuration.json"
            runner_tmp="${RUNNER_TEMP:-/tmp}"
            vcpkg_root="${VCPKG_ROOT:-${runner_tmp}/ns-cmsis-nn-vcpkg}"
            downloads_root="${VCPKG_DOWNLOADS:-${runner_tmp}/ns-cmsis-nn-vcpkg-downloads}"
            bootstrap_script="${runner_tmp}/ns-cmsis-nn-vcpkg-init.sh"

            if [[ ! -f "${config_path}" ]]; then
              echo "Error: vcpkg configuration file not found: ${config_path}" >&2
              exit 1
            fi

            if ! command -v curl >/dev/null 2>&1; then
              echo "Error: curl is required to bootstrap vcpkg" >&2
              exit 1
            fi

            if [[ "${ns_cmsis_nn_vcpkg_env}" == /opt/ns-cmsis-nn/* ]]; then
              ns_cmsis_nn_vcpkg_env="${runner_tmp}/ns-cmsis-nn-vcpkg-env.json"
            fi

            mkdir -p "${vcpkg_root}" "${downloads_root}" "$(dirname "${ns_cmsis_nn_vcpkg_env}")"
            curl -fsSL https://aka.ms/vcpkg-init.sh -o "${bootstrap_script}"

            export VCPKG_ROOT="${vcpkg_root}"
            export VCPKG_DOWNLOADS="${downloads_root}"

            # shellcheck disable=SC1090
            . "${bootstrap_script}"

            (
              cd "${workspace_root}"
              "${VCPKG_ROOT}/vcpkg" x-update-registry --all
              "${VCPKG_ROOT}/vcpkg" activate \
                --downloads-root="${downloads_root}" \
                --json="${ns_cmsis_nn_vcpkg_env}"
            )
          fi

          if [[ ! -f "${ns_cmsis_nn_vcpkg_env}" ]]; then
            echo "Error: vcpkg env file not found: ${ns_cmsis_nn_vcpkg_env}" >&2
            exit 1
          fi

          jq -r '.paths.PATH[]?' "${ns_cmsis_nn_vcpkg_env}" >> "$GITHUB_PATH"

      - name: Restore tests-downloads cache
        id: cache-downloads
        uses: actions/cache@v5
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}
          restore-keys: |
            ${{ runner.os }}-tests-downloads-

      - name: Download deps (legacy cache-check path)
        shell: bash
        run: |
          cd Tests/UnitTest
          ./build_and_run_tests.sh -rb

      - name: Save tests-downloads cache
        if: steps.cache-downloads.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}

      - name: Activate Arm tool license
        if: matrix.toolchain == 'AC6'
        uses: ARM-software/cmsis-actions/armlm@v1

      - name: Install required CMSIS packs
        shell: bash
        run: |
          mkdir -p "${CMSIS_PACK_ROOT}"
          cpackget add "ARM::CMSIS@6.3.0" -R "${CMSIS_PACK_ROOT}" -F --agree-embedded-license

      - name: Register local NS-CMSIS-NN pack
        shell: bash
        run: |
          mkdir -p "${CMSIS_PACK_ROOT}"
          rm -rf "${CMSIS_PACK_ROOT}/.Local"
          cpackget add Ambiq.NS-CMSIS-NN.pdsc -R "${CMSIS_PACK_ROOT}" -F --agree-embedded-license

      - name: Build library variants
        shell: bash
        run: |
          set +e
          set -o pipefail

          export PATH="$GITHUB_WORKSPACE/Tests/UnitTest/downloads/arm_gcc_download/bin:$PATH"
          source Tests/UnitTest/downloads/cmsis_nn_venv/bin/activate

          optimization_args=()
          if [[ -n "${LIB_OPTIMIZATION}" ]]; then
            # Keep dash-prefixed values like -Ofast bound to the option for argparse.
            optimization_args=("--optimization=${LIB_OPTIMIZATION}")
          fi

          python3 Tests/UnitTest/build_lib_variants.py \
            --toolchain "${{ matrix.toolchain }}" \
            --variants "${LIB_VARIANTS}" \
            --cpu "${{ matrix.cpu }}" \
            --cmsis-pack-root "${CMSIS_PACK_ROOT}" \
            "${optimization_args[@]}" \
            --jobs 4 \
            --build-root "${LIB_BUILD_ROOT}" | tee build_lib_variants.log

          status=${PIPESTATUS[0]}

          {
            echo "## ${{ matrix.toolchain_label }}"
            echo ""
              echo "- CPU: \`${{ matrix.cpu }}\`"
            echo "- Variants: \`${LIB_VARIANTS}\`"
            echo "- Optimization: \`${LIB_OPTIMIZATION}\`"
            echo ""
            echo '```text'
            if grep -q '^CMSIS-NN library variant summary' build_lib_variants.log; then
              sed -n '/^CMSIS-NN library variant summary/,$p' build_lib_variants.log
            else
              cat build_lib_variants.log
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "${status}"

      - name: Upload build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: lib-variants-${{ matrix.key }}
          path: |
            build_lib_variants.log
            ${{ env.LIB_BUILD_ROOT }}/**/*.log