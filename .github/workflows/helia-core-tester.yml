name: Helia Core Tester

on:
  workflow_call:
    inputs:
      container_image:
        description: Optional container image override for the test jobs. When unset, the workflow tries the latest release-tagged image and falls back to :latest.
        required: false
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      container_image:
        description: Optional container image override for the test jobs. When unset, the workflow tries the latest release-tagged image and falls back to :latest.
        required: false
        default: ''
        type: string

jobs:
  resolve-container-image:
    uses: ./.github/workflows/resolve-ci-image.yml
    with:
      container_image: ${{ inputs.container_image }}

  codegen-tests:
    runs-on: ubuntu-latest
    needs: resolve-container-image
    container:
      image: ${{ needs.resolve-container-image.outputs.container_image }}
    strategy:
      fail-fast: false
      matrix:
        cpu:
          - cortex-m0
          - cortex-m4
          - cortex-m55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Log selected container image
        shell: bash
        run: |
          {
            echo "### Job container image"
            echo "- selected image: \`${{ needs.resolve-container-image.outputs.container_image }}\`"
            echo "- source: \`${{ needs.resolve-container-image.outputs.resolved_from }}\`"
            if [[ -n "${{ needs.resolve-container-image.outputs.release_tag }}" ]]; then
              echo "- latest release tag: \`${{ needs.resolve-container-image.outputs.release_tag }}\`"
            else
              echo "- latest release tag: _(unavailable)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      
      - name: Mark workspace as a safe git directory
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      
      - name: Verify pinned helia-core-tester release tag
        id: helia-core-meta
        shell: bash
        run: |
          set -euo pipefail
          submodule_path='Tests/helia-core-tester'
          helia_sha="$(git rev-parse HEAD:${submodule_path})"
          helia_tag="$(git -C "${submodule_path}" describe --tags --exact-match)"

          echo "helia_sha=${helia_sha}" >> "$GITHUB_OUTPUT"
          echo "helia_tag=${helia_tag}" >> "$GITHUB_OUTPUT"

          printf 'Pinned helia-core-tester: %s (%s)\n' "${helia_tag}" "${helia_sha}"
          {
            echo "### helia-core-tester version"
            echo "- tag: \`${helia_tag}\`"
            echo "- sha: \`${helia_sha}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache helia-core-tester downloads
        uses: actions/cache@v4
        with:
          path: Tests/helia-core-tester/artifacts/downloads
          key: helia-core-tester-downloads-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Tests/helia-core-tester/scripts/setup_ci.sh', 'Tests/helia-core-tester/helia_core_tester/scripts/setup_dependencies.py') }}
          restore-keys: |
            helia-core-tester-downloads-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup helia-core-tester build dependencies
        run: |
          cd Tests/helia-core-tester
          ./scripts/setup_ci.sh

      - name: Run helia-core-tester full pipeline with coverage and JUnit
        run: |
          cd Tests/helia-core-tester
          uv run helia_core_tester full --cpu ${{ matrix.cpu }} --coverage --report-formats json --report-formats junit --run-jobs 0 --verbosity 1

      - name: Upload per-CPU reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: reports-${{ matrix.cpu }}
          path: Tests/helia-core-tester/artifacts/reports
          if-no-files-found: error

  coverage-merge-summary:
    runs-on: ubuntu-latest
    needs:
      - resolve-container-image
      - codegen-tests
    container:
      image: ${{ needs.resolve-container-image.outputs.container_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Log selected container image
        shell: bash
        run: |
          {
            echo "### Job container image"
            echo "- selected image: \`${{ needs.resolve-container-image.outputs.container_image }}\`"
            echo "- source: \`${{ needs.resolve-container-image.outputs.resolved_from }}\`"
            if [[ -n "${{ needs.resolve-container-image.outputs.release_tag }}" ]]; then
              echo "- latest release tag: \`${{ needs.resolve-container-image.outputs.release_tag }}\`"
            else
              echo "- latest release tag: _(unavailable)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mark workspace as a safe git directory
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
        
      - name: Verify pinned helia-core-tester release tag
        id: helia-core-meta
        shell: bash
        run: |
          set -euo pipefail
          submodule_path='Tests/helia-core-tester'
          helia_sha="$(git rev-parse HEAD:${submodule_path})"
          helia_tag="$(git -C "${submodule_path}" describe --tags --exact-match)"

          echo "helia_sha=${helia_sha}" >> "$GITHUB_OUTPUT"
          echo "helia_tag=${helia_tag}" >> "$GITHUB_OUTPUT"

          printf 'Pinned helia-core-tester: %s (%s)\n' "${helia_tag}" "${helia_sha}"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install and sync Python deps (helia-core-tester)
        run: |
          cd Tests/helia-core-tester
          uv sync

      - name: Download cortex-m0 reports
        uses: actions/download-artifact@v4
        with:
          name: reports-cortex-m0
          path: Tests/helia-core-tester/artifacts/reports

      - name: Download cortex-m4 reports
        uses: actions/download-artifact@v4
        with:
          name: reports-cortex-m4
          path: Tests/helia-core-tester/artifacts/reports

      - name: Download cortex-m55 reports
        uses: actions/download-artifact@v4
        with:
          name: reports-cortex-m55
          path: Tests/helia-core-tester/artifacts/reports

      - name: Run helia-core-tester coverage merge
        run: |
          cd Tests/helia-core-tester
          uv run helia_core_tester coverage-merge --cpu cortex-m0,cortex-m4,cortex-m55

      - name: Publish CPU coverage and test summary table
        run: |
          cd Tests/helia-core-tester
          uv run python -m helia_core_tester.scripts.publish_cpu_coverage_summary --artifacts-root artifacts --cpus cortex-m0,cortex-m4,cortex-m55 --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Upload merged coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-merged
          path: Tests/helia-core-tester/artifacts/reports/coverage/merged
          if-no-files-found: error
