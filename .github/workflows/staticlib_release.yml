name: Static Lib Release

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch, commit, or tag) to build
        required: true
        type: string
      tag:
        description: Release tag name
        required: false
        type: string
      upload_to_release:
        description: Upload the bundle to the GitHub release
        required: false
        type: boolean
        default: true
      create_draft_release:
        description: Create a draft release before upload when needed
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, commit, or tag) to build
        required: true
        default: main
        type: string
      tag:
        description: Release tag name (required when uploading to Releases)
        required: false
        default: ""
        type: string
      upload_to_release:
        description: Upload the bundle to the GitHub release
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: read

concurrency:
  group: staticlib-release-${{ inputs.tag || inputs.ref || github.sha }}
  cancel-in-progress: false

jobs:
  build-static-library:
    name: Build static library (${{ matrix.arch }} • ${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.NS_CMSIS_NN_CI_IMAGE || 'ghcr.io/ambiqai/ns-cmsis-nn-ci:sha-29ba7bce' }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        arch:
          - cortex-m0
          - cortex-m4+fp
          - cortex-m55
        toolchain:
          - gcc
          - armclang

    env:
      ARM_UBL_LICENSE_IDENTIFIER: ${{ secrets.ARM_UBL_LICENSE_IDENTIFIER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Mark workspace safe
        run: git config --global --add safe.directory "*"

      - name: Preflight runtime tooling
        run: bash scripts/ci_preflight.sh

      - name: Validate armclang license
        if: ${{ matrix.toolchain == 'armclang' }}
        run: |
          if [[ -z "${ARM_UBL_LICENSE_IDENTIFIER}" ]]; then
            echo "::error ::ARM_UBL_LICENSE_IDENTIFIER is required for armclang builds."
            exit 1
          fi

      - name: Install Arm tools
        if: ${{ matrix.toolchain == 'armclang' }}
        uses: ARM-software/cmsis-actions/vcpkg@v1
        with:
          config: .github/arm/vcpkg-configuration.json

      - name: Activate Arm tool license
        if: ${{ matrix.toolchain == 'armclang' }}
        uses: ARM-software/cmsis-actions/armlm@v1
        with:
          code: ${{ secrets.ARM_UBL_LICENSE_IDENTIFIER }}

      - name: Cache release dependencies
        uses: actions/cache@v4
        with:
          path: Tests/UnitTest/downloads
          key: staticlib-release-downloads-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/setup_release_dependencies.py') }}
          restore-keys: |
            staticlib-release-downloads-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup release dependencies
        run: |
          python3 scripts/setup_release_dependencies.py \
            --downloads-dir Tests/UnitTest/downloads

      - name: Preflight toolchain tooling
        run: |
          bash scripts/ci_preflight.sh \
            --toolchain "${{ matrix.toolchain }}" \
            --downloads-dir Tests/UnitTest/downloads

      - name: Build static library
        run: |
          bash scripts/build_release_combo.sh \
            --arch "${{ matrix.arch }}" \
            --toolchain "${{ matrix.toolchain }}" \
            --build release \
            --outdir "out/staticlibs/${{ matrix.arch }}/${{ matrix.toolchain }}"

      - name: Upload static library artifact
        uses: actions/upload-artifact@v4
        with:
          name: staticlib-${{ matrix.arch }}-${{ matrix.toolchain }}
          path: out/staticlibs/${{ matrix.arch }}/${{ matrix.toolchain }}/**
          if-no-files-found: error

  package-staticlibs:
    name: Package static libraries
    needs: build-static-library
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          ref_in='${{ inputs.ref }}'
          tag_in='${{ inputs.tag }}'
          upload='${{ inputs.upload_to_release }}'

          if [[ -z "${ref_in}" ]]; then
            echo "::error ::Input ref is required."
            exit 1
          fi

          if [[ "${upload}" == "true" && -z "${tag_in}" ]]; then
            echo "::error ::tag is required when upload_to_release is true."
            exit 1
          fi

          if [[ -z "${tag_in}" ]]; then
            tag_in="${ref_in//\//-}"
          fi

          echo "tag=${tag_in}" >> "${GITHUB_OUTPUT}"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Download static library artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Package static libraries
        run: |
          bash scripts/build_release_bundle.sh \
            --skip-build \
            --artifact-root artifacts \
            --tag "${{ steps.meta.outputs.tag }}" \
            --outdir upload

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ns-cmsis-nn-staticlibs-${{ steps.meta.outputs.tag }}
          path: upload/ns-cmsis-nn-staticlibs-${{ steps.meta.outputs.tag }}.zip
          if-no-files-found: error

      - name: Ensure draft release exists for manual upload
        if: ${{ inputs.create_draft_release && (inputs.upload_to_release == true || inputs.upload_to_release == 'true') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag='${{ steps.meta.outputs.tag }}'
          is_draft="$(gh release view "${tag}" --json isDraft -q '.isDraft' 2>/dev/null || true)"
          if [[ -z "${is_draft}" ]]; then
            gh release create "${tag}" --draft --title "${tag}" --notes ""
          elif [[ "${is_draft}" == "true" ]]; then
            echo "Draft release ${tag} already exists."
          else
            echo "Release ${tag} already exists and is published; assets will be uploaded to the existing release."
          fi

      - name: Upload bundle to GitHub release
        if: ${{ inputs.upload_to_release == true || inputs.upload_to_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "upload/ns-cmsis-nn-staticlibs-${{ steps.meta.outputs.tag }}.zip" \
            --clobber
