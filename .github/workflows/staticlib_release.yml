name: Static Lib Release

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch, commit, or tag) to build
        required: true
        type: string
      tag:
        description: Release tag name used for both the release assets and the GHCR CI image tag
        required: true
        type: string
      image_ref:
        description: Fully qualified CI image reference
        required: false
        type: string
        default: ""
      publish_to_ns_release:
        description: Publish the package artifacts to the ns-cmsis-nn release
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, commit, or tag) to build
        required: true
        default: main
        type: string
      tag:
        description: Release tag name used for both the release assets and the GHCR CI image tag
        required: true
        type: string
      image_ref:
        description: Fully qualified CI image override
        required: false
        default: ""
        type: string
      publish_to_ns_release:
        description: Publish the package artifacts to the ns-cmsis-nn release
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: read
  id-token: write

concurrency:
  group: staticlib-release-${{ inputs.tag || inputs.ref || github.sha }}
  cancel-in-progress: false

jobs:
  resolve-build-plan:
    name: Resolve build plan
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      package_tag: ${{ steps.meta.outputs.package_tag }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      gcc_matrix: ${{ steps.meta.outputs.gcc_matrix }}
      armclang_matrix: ${{ steps.meta.outputs.armclang_matrix }}
      llvm_et_arm_matrix: ${{ steps.meta.outputs.llvm_et_arm_matrix }}
    steps:
      - name: Resolve release metadata and matrices
        id: meta
        env:
          REF_INPUT: ${{ inputs.ref }}
          TAG_INPUT: ${{ inputs.tag }}
          IMAGE_REF_INPUT: ${{ inputs.image_ref }}
          TRIGGER_EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          ref_in="${REF_INPUT}"
          tag_in="${TAG_INPUT}"
          image_ref_in="${IMAGE_REF_INPUT}"
          release_tag_in="${TAG_INPUT}"
          expected_image_ref="ghcr.io/ambiqai/ns-cmsis-nn-ci:${tag_in}"

          [[ -n "${ref_in}" ]] || { echo "::error ::Input ref is required."; exit 1; }
          [[ -n "${tag_in}" ]] || { echo "::error ::Input tag is required."; exit 1; }
          [[ -n "${release_tag_in}" ]] || { echo "::error ::Resolved release tag is required."; exit 1; }

          if [[ "${TRIGGER_EVENT}" == "workflow_dispatch" ]]; then
            image_ref="${image_ref_in:-${expected_image_ref}}"
          else
            image_ref="${expected_image_ref}"
            if [[ -n "${image_ref_in}" && "${image_ref_in}" != "${expected_image_ref}" ]]; then
              echo "::error ::image_ref mismatch for tag ${tag_in}: expected ${expected_image_ref}, got ${image_ref_in}."
              exit 1
            fi
          fi

          echo "ref=${ref_in}" >> "${GITHUB_OUTPUT}"
          echo "package_tag=${tag_in}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag_in}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

          python3 - "${GITHUB_OUTPUT}" "${image_ref}" <<'PY'
          import json
          import sys

          github_output = sys.argv[1]
          image_ref = sys.argv[2]
          combos = [
              {"arch": "cortex-m0", "arch_label": "cm0", "target_cpu": "cortex-m0", "image_ref": image_ref},
              {"arch": "cortex-m4+fp", "arch_label": "cm4", "target_cpu": "cortex-m4", "image_ref": image_ref},
              {"arch": "cortex-m55", "arch_label": "cm55", "target_cpu": "cortex-m55", "image_ref": image_ref},
          ]

          with open(github_output, "a", encoding="utf-8") as handle:
              print(f"gcc_matrix={json.dumps(combos, separators=(',', ':'))}", file=handle)
              print(f"armclang_matrix={json.dumps(combos, separators=(',', ':'))}", file=handle)
              print(f"llvm_et_arm_matrix={json.dumps(combos, separators=(',', ':'))}", file=handle)
          PY

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate tagged CI image
        run: |
          set -euo pipefail
          docker manifest inspect "${{ steps.meta.outputs.image_ref }}" >/dev/null

  build-gcc:
    name: Build static library (${{ matrix.arch }} • gcc)
    needs: resolve-build-plan
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include: ${{ fromJson(needs.resolve-build-plan.outputs.gcc_matrix) }}
    uses: ./.github/workflows/build_staticlib_gcc.yml
    with:
      ref: ${{ needs.resolve-build-plan.outputs.ref }}
      tag: ${{ needs.resolve-build-plan.outputs.package_tag }}
      image_ref: ${{ matrix.image_ref }}
      arch: ${{ matrix.arch }}
      arch_label: ${{ matrix.arch_label }}
      target_cpu: ${{ matrix.target_cpu }}

  build-armclang:
    name: Build static library (${{ matrix.arch }} • armclang)
    needs: resolve-build-plan
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include: ${{ fromJson(needs.resolve-build-plan.outputs.armclang_matrix) }}
    uses: ./.github/workflows/build_staticlib_armclang.yml
    with:
      ref: ${{ needs.resolve-build-plan.outputs.ref }}
      tag: ${{ needs.resolve-build-plan.outputs.package_tag }}
      image_ref: ${{ matrix.image_ref }}
      arch: ${{ matrix.arch }}
      arch_label: ${{ matrix.arch_label }}
      target_cpu: ${{ matrix.target_cpu }}
    secrets:
      ARM_UBL_LICENSE_IDENTIFIER: ${{ secrets.ARM_UBL_LICENSE_IDENTIFIER }}

  build-ATFE:
      name: Build static library (${{ matrix.arch }} • ATFE)
      needs: resolve-build-plan
      strategy:
        fail-fast: false
        max-parallel: 3
        matrix:
          include: ${{ fromJson(needs.resolve-build-plan.outputs.llvm_et_arm_matrix) }}
      uses: ./.github/workflows/build_staticlib_atfe.yml
      with:
        ref: ${{ needs.resolve-build-plan.outputs.ref }}
        tag: ${{ needs.resolve-build-plan.outputs.package_tag }}
        image_ref: ${{ matrix.image_ref }}
        arch: ${{ matrix.arch }}
        arch_label: ${{ matrix.arch_label }}
        target_cpu: ${{ matrix.target_cpu }}

  package-binary-sdk:
    name: Package external binary SDK
    needs:
      - resolve-build-plan
      - build-gcc
      - build-armclang
      - build-ATFE
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-build-plan.outputs.ref }}
          fetch-depth: 0

      - name: Download static library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: staticlib-*
          path: artifacts
          merge-multiple: true

      - name: Package binary SDK
        run: |
          bash scripts/build_release_bundle.sh \
            --skip-build \
            --artifact-root artifacts \
            --tag "${{ needs.resolve-build-plan.outputs.package_tag }}" \
            --outdir upload \
            --source-commit "${{ github.sha }}" \
            --source-ref "${{ needs.resolve-build-plan.outputs.ref }}" \
            --workflow-name "${{ github.workflow }}" \
            --workflow-run-id "${{ github.run_id }}"

      - name: Validate binary SDK package
        run: |
          bash scripts/validate_binary_package.sh \
            --package-dir "upload/ns-cmsis-nn-binary-sdk-${{ needs.resolve-build-plan.outputs.package_tag }}" \
            --package-type binary-sdk

      - name: Upload binary SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ns-cmsis-nn-binary-sdk-${{ needs.resolve-build-plan.outputs.package_tag }}
          path: upload/ns-cmsis-nn-binary-sdk-${{ needs.resolve-build-plan.outputs.package_tag }}.zip
          if-no-files-found: error

  package-zephyr-binary:
    name: Package external Zephyr binary module
    needs:
      - resolve-build-plan
      - build-gcc
      - build-armclang
      - build-ATFE
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-build-plan.outputs.ref }}
          fetch-depth: 0

      - name: Download static library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: staticlib-*
          path: artifacts
          merge-multiple: true

      - name: Package Zephyr binary module
        run: |
          bash scripts/build_zephyr_release_package.sh \
            --artifact-root artifacts \
            --tag "${{ needs.resolve-build-plan.outputs.package_tag }}" \
            --outdir upload \
            --source-commit "${{ github.sha }}" \
            --source-ref "${{ needs.resolve-build-plan.outputs.ref }}" \
            --workflow-name "${{ github.workflow }}" \
            --workflow-run-id "${{ github.run_id }}"

      - name: Validate Zephyr binary package
        run: |
          bash scripts/validate_binary_package.sh \
            --package-dir "upload/ns-cmsis-nn-zephyr-binary-${{ needs.resolve-build-plan.outputs.package_tag }}" \
            --package-type zephyr-binary

      - name: Upload Zephyr binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ns-cmsis-nn-zephyr-binary-${{ needs.resolve-build-plan.outputs.package_tag }}
          path: upload/ns-cmsis-nn-zephyr-binary-${{ needs.resolve-build-plan.outputs.package_tag }}.zip
          if-no-files-found: error

  publish-release-assets:
    name: Publish release assets
    needs:
      - resolve-build-plan
      - package-binary-sdk
      - package-zephyr-binary
    if: ${{ inputs.publish_to_ns_release == true || inputs.publish_to_ns_release == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-build-plan.outputs.ref }}
          fetch-depth: 0

      - name: Download binary SDK artifact
        uses: actions/download-artifact@v4
        with:
          name: ns-cmsis-nn-binary-sdk-${{ needs.resolve-build-plan.outputs.package_tag }}
          path: upload

      - name: Download Zephyr binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ns-cmsis-nn-zephyr-binary-${{ needs.resolve-build-plan.outputs.package_tag }}
          path: upload

      - name: Normalize downloaded package artifacts
        run: |
          set -euo pipefail
          package_tag='${{ needs.resolve-build-plan.outputs.package_tag }}'

          sdk_src="$(find upload -type f -name "ns-cmsis-nn-binary-sdk-${package_tag}.zip" | head -n1)"
          zephyr_src="$(find upload -type f -name "ns-cmsis-nn-zephyr-binary-${package_tag}.zip" | head -n1)"
          sdk_dst="upload/ns-cmsis-nn-binary-sdk-${package_tag}.zip"
          zephyr_dst="upload/ns-cmsis-nn-zephyr-binary-${package_tag}.zip"

          [[ -n "${sdk_src}" ]] || { echo "Binary SDK zip not found after artifact download" >&2; exit 1; }
          [[ -n "${zephyr_src}" ]] || { echo "Zephyr binary zip not found after artifact download" >&2; exit 1; }

          if [[ "${sdk_src}" != "${sdk_dst}" ]]; then
            cp "${sdk_src}" "${sdk_dst}"
          fi
          if [[ "${zephyr_src}" != "${zephyr_dst}" ]]; then
            cp "${zephyr_src}" "${zephyr_dst}"
          fi

      - name: Generate release metadata
        run: |
          set -euo pipefail
          package_tag='${{ needs.resolve-build-plan.outputs.package_tag }}'
          release_tag='${{ needs.resolve-build-plan.outputs.release_tag }}'

          sdk_zip="upload/ns-cmsis-nn-binary-sdk-${package_tag}.zip"
          zephyr_zip="upload/ns-cmsis-nn-zephyr-binary-${package_tag}.zip"
          release_index="upload/ns-cmsis-nn-release-index-${package_tag}.json"

          python3 scripts/release_package_metadata.py write-release-index \
            --output "${release_index}" \
            --release-repo "${{ github.repository }}" \
            --release-tag "${release_tag}" \
            --source-repo "${{ github.repository }}" \
            --source-commit "${{ github.sha }}" \
            --source-ref "${{ needs.resolve-build-plan.outputs.ref }}" \
            --workflow-name "${{ github.workflow }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --assets \
              "binary-sdk=${sdk_zip}" \
              "zephyr-binary=${zephyr_zip}"

      - name: Publish assets to ns-cmsis-nn release
        if: ${{ inputs.publish_to_ns_release == true || inputs.publish_to_ns_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          package_tag='${{ needs.resolve-build-plan.outputs.package_tag }}'

          gh release upload "${package_tag}" \
            "upload/ns-cmsis-nn-binary-sdk-${package_tag}.zip" \
            "upload/ns-cmsis-nn-zephyr-binary-${package_tag}.zip" \
            "upload/ns-cmsis-nn-release-index-${package_tag}.json" \
            --repo "${{ github.repository }}" \
            --clobber

