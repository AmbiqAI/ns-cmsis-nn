name: Static Lib Release

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch, commit, or tag) to build
        required: true
        type: string
      tag:
        description: Release tag name used for both the release assets and the GHCR CI image tag
        required: true
        type: string
      upload_to_release:
        description: Upload the bundle to the GitHub release
        required: false
        type: boolean
        default: true
      create_draft_release:
        description: Create a draft release before upload when needed
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, commit, or tag) to build
        required: true
        default: main
        type: string
      tag:
        description: Release tag name used for both the release assets and the GHCR CI image tag
        required: true
        type: string
      upload_to_release:
        description: Upload the bundle to the GitHub release
        required: false
        default: false
        type: boolean
      create_draft_release:
        description: Create a draft release before upload when needed
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: read
  id-token: write

concurrency:
  group: staticlib-release-${{ inputs.tag || inputs.ref || github.sha }}
  cancel-in-progress: false

jobs:
  resolve-build-plan:
    name: Resolve build plan
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      tag: ${{ steps.meta.outputs.tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      gcc_matrix: ${{ steps.meta.outputs.gcc_matrix }}
      armclang_matrix: ${{ steps.meta.outputs.armclang_matrix }}
      llvm_et_arm_matrix: ${{ steps.meta.outputs.llvm_et_arm_matrix }}
    steps:
      - name: Resolve release metadata and matrices
        id: meta
        env:
          REF_INPUT: ${{ inputs.ref }}
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          ref_in="${REF_INPUT}"
          tag_in="${TAG_INPUT}"

          [[ -n "${ref_in}" ]] || { echo "::error ::Input ref is required."; exit 1; }
          [[ -n "${tag_in}" ]] || { echo "::error ::Input tag is required."; exit 1; }

          image_ref="ghcr.io/ambiqai/ns-cmsis-nn-ci:${tag_in}"
          echo "ref=${ref_in}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag_in}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

          python3 - "${GITHUB_OUTPUT}" "${image_ref}" <<'PY'
          import json
          import sys

          github_output = sys.argv[1]
          image_ref = sys.argv[2]
          combos = [
              {"arch": "cortex-m0", "arch_label": "cm0", "target_cpu": "cortex-m0", "image_ref": image_ref},
              {"arch": "cortex-m4+fp", "arch_label": "cm4", "target_cpu": "cortex-m4", "image_ref": image_ref},
              {"arch": "cortex-m55", "arch_label": "cm55", "target_cpu": "cortex-m55", "image_ref": image_ref},
          ]

          with open(github_output, "a", encoding="utf-8") as handle:
              print(f"gcc_matrix={json.dumps(combos, separators=(',', ':'))}", file=handle)
              print(f"armclang_matrix={json.dumps(combos, separators=(',', ':'))}", file=handle)
              print(f"llvm_et_arm_matrix={json.dumps(combos, separators=(',', ':'))}", file=handle)
          PY

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate tagged CI image
        run: |
          set -euo pipefail
          docker manifest inspect "${{ steps.meta.outputs.image_ref }}" >/dev/null

  build-gcc:
    name: Build static library (${{ matrix.arch }} • gcc)
    needs: resolve-build-plan
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include: ${{ fromJson(needs.resolve-build-plan.outputs.gcc_matrix) }}
    uses: ./.github/workflows/build_staticlib_gcc.yml
    with:
      ref: ${{ needs.resolve-build-plan.outputs.ref }}
      tag: ${{ needs.resolve-build-plan.outputs.tag }}
      image_ref: ${{ matrix.image_ref }}
      arch: ${{ matrix.arch }}
      arch_label: ${{ matrix.arch_label }}
      target_cpu: ${{ matrix.target_cpu }}

  build-armclang:
    name: Build static library (${{ matrix.arch }} • armclang)
    needs: resolve-build-plan
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include: ${{ fromJson(needs.resolve-build-plan.outputs.armclang_matrix) }}
    uses: ./.github/workflows/build_staticlib_armclang.yml
    with:
      ref: ${{ needs.resolve-build-plan.outputs.ref }}
      tag: ${{ needs.resolve-build-plan.outputs.tag }}
      image_ref: ${{ matrix.image_ref }}
      arch: ${{ matrix.arch }}
      arch_label: ${{ matrix.arch_label }}
      target_cpu: ${{ matrix.target_cpu }}
    secrets:
      ARM_UBL_LICENSE_IDENTIFIER: ${{ secrets.ARM_UBL_LICENSE_IDENTIFIER }}

  build-llvm-et-arm:
    name: Build static library (${{ matrix.arch }} • llvm-et-arm)
    needs: resolve-build-plan
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include: ${{ fromJson(needs.resolve-build-plan.outputs.llvm_et_arm_matrix) }}
    uses: ./.github/workflows/build_staticlib_llvm_et_arm.yml
    with:
      ref: ${{ needs.resolve-build-plan.outputs.ref }}
      tag: ${{ needs.resolve-build-plan.outputs.tag }}
      image_ref: ${{ matrix.image_ref }}
      arch: ${{ matrix.arch }}
      arch_label: ${{ matrix.arch_label }}
      target_cpu: ${{ matrix.target_cpu }}

  package-binary-sdk:
    name: Package external binary SDK
    needs:
      - resolve-build-plan
      - build-gcc
      - build-armclang
      - build-llvm-et-arm
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-build-plan.outputs.ref }}
          fetch-depth: 0

      - name: Download static library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: staticlib-*
          path: artifacts
          merge-multiple: true

      - name: Package binary SDK
        run: |
          bash scripts/build_release_bundle.sh \
            --skip-build \
            --artifact-root artifacts \
            --tag "${{ needs.resolve-build-plan.outputs.tag }}" \
            --outdir upload \
            --source-commit "${{ github.sha }}" \
            --source-ref "${{ needs.resolve-build-plan.outputs.ref }}" \
            --workflow-name "${{ github.workflow }}" \
            --workflow-run-id "${{ github.run_id }}"

      - name: Validate binary SDK package
        run: |
          bash scripts/validate_binary_package.sh \
            --package-dir "upload/ns-cmsis-nn-binary-sdk-${{ needs.resolve-build-plan.outputs.tag }}" \
            --package-type binary-sdk

      - name: Upload binary SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ns-cmsis-nn-binary-sdk-${{ needs.resolve-build-plan.outputs.tag }}
          path: upload/ns-cmsis-nn-binary-sdk-${{ needs.resolve-build-plan.outputs.tag }}.zip
          if-no-files-found: error

      - name: Ensure draft release exists for manual upload
        if: ${{ inputs.create_draft_release && needs.resolve-build-plan.outputs.tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag='${{ needs.resolve-build-plan.outputs.tag }}'
          is_draft="$(gh release view "${tag}" --repo "${{ github.repository }}" --json isDraft -q '.isDraft' 2>/dev/null || true)"
          if [[ -z "${is_draft}" ]]; then
            gh release create "${tag}" --repo "${{ github.repository }}" --draft --title "${tag}" --notes ""
          elif [[ "${is_draft}" == "true" ]]; then
            echo "Draft release ${tag} already exists."
          else
            echo "Release ${tag} already exists and is published; assets will be uploaded to the existing release."
          fi

      - name: Upload binary SDK to GitHub release
        if: ${{ inputs.upload_to_release == true || inputs.upload_to_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ needs.resolve-build-plan.outputs.tag }}" \
            "upload/ns-cmsis-nn-binary-sdk-${{ needs.resolve-build-plan.outputs.tag }}.zip" \
            --repo "${{ github.repository }}" \
            --clobber

  package-zephyr-binary:
    name: Package external Zephyr binary module
    needs:
      - resolve-build-plan
      - build-gcc
      - build-armclang
      - build-llvm-et-arm
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-build-plan.outputs.ref }}
          fetch-depth: 0

      - name: Download static library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: staticlib-*
          path: artifacts
          merge-multiple: true

      - name: Package Zephyr binary module
        run: |
          bash scripts/build_zephyr_release_package.sh \
            --artifact-root artifacts \
            --tag "${{ needs.resolve-build-plan.outputs.tag }}" \
            --outdir upload \
            --source-commit "${{ github.sha }}" \
            --source-ref "${{ needs.resolve-build-plan.outputs.ref }}" \
            --workflow-name "${{ github.workflow }}" \
            --workflow-run-id "${{ github.run_id }}"

      - name: Validate Zephyr binary package
        run: |
          bash scripts/validate_binary_package.sh \
            --package-dir "upload/ns-cmsis-nn-zephyr-binary-${{ needs.resolve-build-plan.outputs.tag }}" \
            --package-type zephyr-binary

      - name: Upload Zephyr binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ns-cmsis-nn-zephyr-binary-${{ needs.resolve-build-plan.outputs.tag }}
          path: upload/ns-cmsis-nn-zephyr-binary-${{ needs.resolve-build-plan.outputs.tag }}.zip
          if-no-files-found: error

      - name: Ensure draft release exists for manual upload
        if: ${{ inputs.create_draft_release && needs.resolve-build-plan.outputs.tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag='${{ needs.resolve-build-plan.outputs.tag }}'
          is_draft="$(gh release view "${tag}" --repo "${{ github.repository }}" --json isDraft -q '.isDraft' 2>/dev/null || true)"
          if [[ -z "${is_draft}" ]]; then
            gh release create "${tag}" --repo "${{ github.repository }}" --draft --title "${tag}" --notes ""
          elif [[ "${is_draft}" == "true" ]]; then
            echo "Draft release ${tag} already exists."
          else
            echo "Release ${tag} already exists and is published; assets will be uploaded to the existing release."
          fi

      - name: Upload Zephyr binary package to GitHub release
        if: ${{ inputs.upload_to_release == true || inputs.upload_to_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ needs.resolve-build-plan.outputs.tag }}" \
            "upload/ns-cmsis-nn-zephyr-binary-${{ needs.resolve-build-plan.outputs.tag }}.zip" \
            --repo "${{ github.repository }}" \
            --clobber
