name: Release Assets Curated Tree

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch, commit, or tag) to build
        required: true
        type: string
      tag:
        description: Release tag name
        required: false
        type: string
      upload_to_release:
        description: Upload the signed bundles to the GitHub release
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, commit, or tag) to build
        required: true
        default: main
        type: string
      tag:
        description: Release tag name (required when uploading to Releases)
        required: false
        default: ""
        type: string
      upload_to_release:
        description: Upload the signed bundles to the GitHub release
        required: false
        default: false
        type: boolean

jobs:
  release-assets:
    uses: ./.github/workflows/release_assets.yml
    with:
      ref: ${{ inputs.ref }}
      tag: ${{ inputs.tag }}
      upload_to_release: ${{ inputs.upload_to_release }}
      visibility_mode: curated-tree
      create_draft_release: ${{ github.event_name == 'workflow_dispatch' }}
    secrets: inherit
