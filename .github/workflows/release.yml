name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-22.04
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}

    steps:
      - name: Create or update release PR
        uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  pack-and-docs:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Wait for release API to be ready
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag='${{ needs.release-please.outputs.tag_name }}'
          for i in {1..10}; do
            if gh api repos/${{ github.repository }}/releases/tags/"$tag" >/dev/null 2>&1; then
              echo "Release $tag is available."
              exit 0
            fi
            echo "Waiting for release $tag (try $i/10)..."
            sleep 3
          done
          echo "Release $tag not visible to API yet." >&2
          exit 1

      - name: Clean output dir
        run: |
          rm -f ./output/*.pack

      - name: Generate pack and docs
        uses: Open-CMSIS-Pack/gen-pack-action@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACK_CHANGELOG_MODE: full
        with:
          doxygen-version: 1.9.6
          packchk-version: 1.4.1
          gen-doc-script: ./Documentation/Doxygen/gen_doc.sh
          doc-path: ./Documentation/html
          gen-pack-script: ./gen_pack.sh --no-preprocess
          gen-pack-output: ./output
          gh-pages-branch: ""
          gh-pages-deploy: ""

      - name: Compute version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ needs.release-please.outputs.tag_name }}'
          version='${{ needs.release-please.outputs.version }}'
          if [[ -z "$version" ]]; then
            version="$(printf '%s\n' "$tag" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          fi
          echo "TAG=$tag" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"

      - name: Upload pack to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ steps.ver.outputs.TAG }}" \
            "./output/ARM.CMSIS-NN.${{ steps.ver.outputs.VERSION }}.pack" \
            --clobber

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./Documentation/html

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  release-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release_assets_library_only.yml
    with:
      ref: ${{ needs.release-please.outputs.tag_name }}
      tag: ${{ needs.release-please.outputs.tag_name }}
      upload_to_release: true
    secrets: inherit

  release-assets-single-facade:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release_assets_single_facade.yml
    with:
      ref: ${{ needs.release-please.outputs.tag_name }}
      tag: ${{ needs.release-please.outputs.tag_name }}
      upload_to_release: true
    secrets: inherit
