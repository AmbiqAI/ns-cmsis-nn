name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write        # tag, releases, uploads
  pull-requests: write   # update/open release PRs
  packages: write        # publish GHCR image
  pages: write           # publish Pages
  id-token: write        # OIDC for Pages deploy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-22.04
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  resolve-release-metadata:
    runs-on: ubuntu-22.04
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    outputs:
      ns_tag: ${{ steps.ns.outputs.tag }}
      ns_version: ${{ steps.ns.outputs.version }}
      helia_tag: ${{ steps.helia.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}
          submodules: recursive

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Resolve NS-CMSIS-NN release tag and version
        id: ns
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ needs.release-please.outputs.tag_name }}'
          version='${{ needs.release-please.outputs.version }}'
          if [[ -z "$version" ]]; then
            version="$(printf '%s\n' "$tag" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Fetch helia tags
        run: |
          git -C Tests/helia-core-tester fetch --tags origin

      - name: Resolve exact helia tag
        id: helia
        shell: bash
        run: |
          set -euo pipefail
          tag="$(git -C Tests/helia-core-tester describe --tags --exact-match)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  publish-release-assets:
    runs-on: ubuntu-22.04
    needs:
      - release-please
      - resolve-release-metadata
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release-metadata.outputs.ns_tag }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Wait for release API to be ready
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag='${{ needs.resolve-release-metadata.outputs.ns_tag }}'
          for i in {1..10}; do
            if gh api repos/${{ github.repository }}/releases/tags/"$tag" >/dev/null 2>&1; then
              echo "Release $tag is available."
              exit 0
            fi
            echo "Waiting for release $tag (try $i/10)..."
            sleep 3
          done
          echo "Release $tag not visible to API yet." >&2
          exit 1

      - name: Clean output dir
        run: |
          rm -f ./output/*.pack

      - name: Generate pack and docs
        uses: Open-CMSIS-Pack/gen-pack-action@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACK_CHANGELOG_MODE: full
        with:
          doxygen-version: 1.9.6
          packchk-version: 1.4.1
          gen-doc-script: ./Documentation/Doxygen/gen_doc.sh
          doc-path: ./Documentation/html
          gen-pack-script: ./gen_pack.sh --no-preprocess
          gen-pack-output: ./output
          gh-pages-branch: ""
          gh-pages-deploy: ""

      - name: Upload pack to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ needs.resolve-release-metadata.outputs.ns_tag }}" \
            "./output/ARM.CMSIS-NN.${{ needs.resolve-release-metadata.outputs.ns_version }}.pack" \
            --clobber

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./Documentation/html

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  publish-ci-image:
    needs:
      - release-please
      - resolve-release-metadata
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/build_publish_docker.yml
    with:
      image_tag: ${{ needs.resolve-release-metadata.outputs.ns_tag }}
      source_ref: ${{ needs.resolve-release-metadata.outputs.ns_tag }}
    secrets: inherit

  update-ci-image-vars:
    runs-on: ubuntu-latest
    needs:
      - release-please
      - resolve-release-metadata
      - publish-ci-image
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Update repository CI image variables
        env:
          GH_TOKEN: ${{ secrets.VARIABLES_TOKEN }}
          NS_TAG: ${{ needs.resolve-release-metadata.outputs.ns_tag }}
          HELIA_TAG: ${{ needs.resolve-release-metadata.outputs.helia_tag }}
        run: |
          set -euo pipefail

          set_var() {
            local name="$1"
            local value="$2"

            if gh api "/repos/${GITHUB_REPOSITORY}/actions/variables/${name}" >/dev/null 2>&1; then
              gh api \
                --method PATCH \
                "/repos/${GITHUB_REPOSITORY}/actions/variables/${name}" \
                -f name="${name}" \
                -f value="${value}" >/dev/null
            else
              gh api \
                --method POST \
                "/repos/${GITHUB_REPOSITORY}/actions/variables" \
                -f name="${name}" \
                -f value="${value}" >/dev/null
            fi
          }

          set_var "CI_IMAGE_TAG" "${NS_TAG}"
          set_var "CI_NS_CMSIS_NN_TAG" "${NS_TAG}"
          set_var "CI_HELIA_CORE_TESTER_TAG" "${HELIA_TAG}"
