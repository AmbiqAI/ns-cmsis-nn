name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write        # tag, releases, uploads
  pull-requests: write   # update/open release PRs
  packages: write        # publish versioned CI images
  pages: write           # publish Pages
  id-token: write        # OIDC for Pages deploy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-22.04
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.ver.outputs.TAG || steps.rp.outputs.tag_name }}
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      # 1) Create/Update Release PR; on merge, tag + create release
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # 2) Only do the rest when a NEW release was created by the step above
      - name: Checkout code
        if: ${{ steps.rp.outputs.release_created }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        if: ${{ steps.rp.outputs.release_created }}
        run: git fetch --tags --force

      - name: Wait for release API to be ready
        if: ${{ steps.rp.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag='${{ steps.rp.outputs.tag_name }}'
          for i in {1..10}; do
            if gh api repos/${{ github.repository }}/releases/tags/"$tag" >/dev/null 2>&1; then
              echo "Release $tag is available."
              exit 0
            fi
            echo "Waiting for release $tag (try $i/10)..."
            sleep 3
          done
          echo "Release $tag not visible to API yet." >&2
          exit 1

      - name: Clean output dir
        if: ${{ steps.rp.outputs.release_created }}
        run: |
          rm -f ./output/*.pack

      - name: Compute version
        if: ${{ steps.rp.outputs.release_created }}
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.rp.outputs.tag_name }}'
          version='${{ steps.rp.outputs.version }}'
          if [[ -z "$version" ]]; then
            version="$(printf '%s\n' "$tag" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          fi
          echo "TAG=$tag" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"

  publish-staticlibs:
    # Cross-compile cmsis-nn as static libraries for cortex-m0 / m4 / m55
    # across the supported release toolchains. Uploads workflow artefacts for
    # downstream release jobs; publish-staticlib-bundles owns GitHub Release
    # uploads so the release page does not grow loose .a/.sha256 pairs.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: release-please
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target_cpu: [cortex-m0, cortex-m4, cortex-m55]
        toolchain: [gcc, atfe, armclang]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install GNU Arm Embedded toolchain
        if: ${{ matrix.toolchain == 'gcc' }}
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 13.2.Rel1

      - name: Install LLVM archive tools
        if: ${{ matrix.toolchain == 'armclang' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends llvm

      - name: Fetch external toolchain
        if: ${{ matrix.toolchain != 'gcc' }}
        id: fetch_toolchain
        run: |
          bash scripts/fetch_toolchain.sh \
            --manifest "ci/toolchains/${{ matrix.toolchain }}.json" \
            --platform linux-x86_64 \
            --outdir "${RUNNER_TEMP}/toolchains"

      - name: Build static library
        env:
          TARGET_CPU: ${{ matrix.target_cpu }}
          TOOLCHAIN: ${{ matrix.toolchain }}
          TOOLCHAIN_ROOT: ${{ steps.fetch_toolchain.outputs.toolchain_root }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          bash scripts/build_staticlib.sh \
            --target-cpu "$TARGET_CPU" \
            --version    "$VERSION" \
            --toolchain  "$TOOLCHAIN" \
            --toolchain-root "$TOOLCHAIN_ROOT" \
            --outdir     "./output/$TOOLCHAIN/$TARGET_CPU"

      - name: Smoke-verify static library
        # GCC and ATfE get a bare-metal link smoke test. armclang currently gets
        # compile-plus-archive-symbol verification because Arm's linker option
        # dialect differs from the GNU/LLD path used by the other toolchains.
        env:
          TARGET_CPU: ${{ matrix.target_cpu }}
          TOOLCHAIN: ${{ matrix.toolchain }}
          TOOLCHAIN_ROOT: ${{ steps.fetch_toolchain.outputs.toolchain_root }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          if [[ "$TOOLCHAIN" == "gcc" ]]; then
            lib="./output/${TOOLCHAIN}/${TARGET_CPU}/libns-cmsis-nn-${TARGET_CPU}-${VERSION}.a"
          else
            lib="./output/${TOOLCHAIN}/${TARGET_CPU}/libns-cmsis-nn-${TOOLCHAIN}-${TARGET_CPU}-${VERSION}.a"
          fi
          bash scripts/smoke/smoke_staticlib.sh \
            --target-cpu "$TARGET_CPU" \
            --toolchain  "$TOOLCHAIN" \
            --toolchain-root "$TOOLCHAIN_ROOT" \
            --library    "$lib" \
            --outdir     "./output/${TOOLCHAIN}/${TARGET_CPU}/smoke"

      - name: Build SDK tarball
        env:
          TARGET_CPU: ${{ matrix.target_cpu }}
          TOOLCHAIN: ${{ matrix.toolchain }}
          TOOLCHAIN_VERSION: ${{ steps.fetch_toolchain.outputs.toolchain_version }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          if [[ "$TOOLCHAIN" == "gcc" ]]; then
            lib="./output/${TOOLCHAIN}/${TARGET_CPU}/libns-cmsis-nn-${TARGET_CPU}-${VERSION}.a"
            toolchain_version="13.2.Rel1"
          else
            lib="./output/${TOOLCHAIN}/${TARGET_CPU}/libns-cmsis-nn-${TOOLCHAIN}-${TARGET_CPU}-${VERSION}.a"
            toolchain_version="$TOOLCHAIN_VERSION"
          fi
          bash scripts/build_sdk_tarball.sh \
            --target-cpu         "$TARGET_CPU" \
            --version            "$VERSION"    \
            --staticlib          "$lib"        \
            --toolchain          "$TOOLCHAIN"  \
            --toolchain-version  "$toolchain_version" \
            --outdir             "./output/${TOOLCHAIN}/${TARGET_CPU}"

      - name: Upload artefacts (cross-job)
        # Pack-prebuilt job (M3 #167 follow-up) downloads these.
        uses: actions/upload-artifact@v4
        with:
          name: ns-cmsis-nn-staticlib-${{ matrix.toolchain }}-${{ matrix.target_cpu }}
          path: |
            ./output/${{ matrix.toolchain }}/${{ matrix.target_cpu }}/libns-cmsis-nn-*.a
            ./output/${{ matrix.toolchain }}/${{ matrix.target_cpu }}/libns-cmsis-nn-*.a.sha256
            ./output/${{ matrix.toolchain }}/${{ matrix.target_cpu }}/ns-cmsis-nn-*.tar.gz
            ./output/${{ matrix.toolchain }}/${{ matrix.target_cpu }}/ns-cmsis-nn-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  publish-staticlib-bundles:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: [release-please, publish-staticlibs]
    runs-on: ubuntu-22.04
    steps:
      - name: Download staticlib artefacts
        uses: actions/download-artifact@v4
        with:
          path: ./_artifacts
          pattern: ns-cmsis-nn-staticlib-*

      - name: Build per-toolchain staticlib bundles
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p ./release-assets
          for toolchain in gcc atfe armclang; do
            bundle="ns-cmsis-nn-staticlibs-${toolchain}-${VERSION}"
            root="./_bundle/${bundle}"
            rm -rf "$root"
            mkdir -p "$root"
            printf '{\n  "schema_version": 1,\n  "package": "ns-cmsis-nn-staticlibs",\n  "version": "%s",\n  "toolchain": "%s",\n  "libraries": [\n' "$VERSION" "$toolchain" > "$root/manifest.json"
            first=1
            for cpu in cortex-m0 cortex-m4 cortex-m55; do
              src_dir="./_artifacts/ns-cmsis-nn-staticlib-${toolchain}-${cpu}"
              if [[ "$toolchain" == "gcc" ]]; then
                src="${src_dir}/libns-cmsis-nn-${cpu}-${VERSION}.a"
              else
                src="${src_dir}/libns-cmsis-nn-${toolchain}-${cpu}-${VERSION}.a"
              fi
              [[ -f "$src" ]] || { echo "missing staticlib: $src" >&2; exit 1; }
              mkdir -p "$root/$cpu"
              cp "$src" "$root/$cpu/libns-cmsis-nn.a"
              ( cd "$root/$cpu" && sha256sum libns-cmsis-nn.a > libns-cmsis-nn.a.sha256 )
              sha="$(awk '{print $1}' "$root/$cpu/libns-cmsis-nn.a.sha256")"
              size="$(stat -c %s "$root/$cpu/libns-cmsis-nn.a")"
              if (( first == 0 )); then printf ',\n' >> "$root/manifest.json"; fi
              first=0
              printf '    { "target_cpu": "%s", "path": "%s/libns-cmsis-nn.a", "sha256": "%s", "size_bytes": %s }' "$cpu" "$cpu" "$sha" "$size" >> "$root/manifest.json"
            done
            printf '\n  ]\n}\n' >> "$root/manifest.json"
            ( cd ./_bundle && zip -qr "../release-assets/${bundle}.zip" "$bundle" )
            ( cd ./release-assets && sha256sum "${bundle}.zip" > "${bundle}.zip.sha256" )
          done
          find ./_artifacts -name 'ns-cmsis-nn-*.tar.gz' -exec cp {} ./release-assets/ \;
          find ./_artifacts -name 'ns-cmsis-nn-*.tar.gz.sha256' -exec cp {} ./release-assets/ \;
          ls -lh ./release-assets

      - name: Upload SDK tarballs and staticlib bundles to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" ./release-assets/* --clobber

  publish-pack:
    # Build the CMSIS-Pack and publish the Sphinx docs site to Pages. Runs after
    # publish-staticlibs because the pack's Cvariant="Prebuilt" component
    # vendors the per-arch libns-cmsis-nn.a archives — packchk fails if a
    # declared <file> is missing, so we cannot run gen-pack until those
    # artefacts exist. Pages publishing rides along with this job because
    # gen-pack-action's Doxygen step also produces ./Documentation/xml for
    # the Sphinx/Breathe/Exhale API reference.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: [release-please, publish-staticlibs]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Wait for release API to be ready
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -e
          for i in {1..10}; do
            if gh api "repos/${{ github.repository }}/releases/tags/$TAG" >/dev/null 2>&1; then
              echo "Release $TAG is available."
              exit 0
            fi
            echo "Waiting for release $TAG (try $i/10)..."
            sleep 3
          done
          echo "Release $TAG not visible to API yet." >&2
          exit 1

      - name: Clean output dir
        run: rm -f ./output/*.pack

      - name: Download per-arch staticlib artefacts
        uses: actions/download-artifact@v4
        with:
          path: ./_artifacts
          pattern: ns-cmsis-nn-staticlib-gcc-*

      - name: Stage prebuilt archives at lib/<cpu>/libns-cmsis-nn.a
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p ./lib
          for cpu in cortex-m0 cortex-m4 cortex-m55; do
            src="./_artifacts/ns-cmsis-nn-staticlib-gcc-${cpu}/libns-cmsis-nn-${cpu}-${VERSION}.a"
            if [[ ! -f "$src" ]]; then
              echo "missing artefact: $src" >&2
              exit 1
            fi
            mkdir -p "./lib/${cpu}"
            cp "$src" "./lib/${cpu}/libns-cmsis-nn.a"
          done
          ls -lR ./lib

      - name: PDSC contract pre-flight
        # Cheap fail-fast: if the manifest's identity/version markers drift,
        # don't bother spending several minutes on Doxygen + gen-pack just to
        # ship a broken pack. See M3 #170.
        run: python3 scripts/check_pdsc.py

      - name: Generate pack and docs
        uses: Open-CMSIS-Pack/gen-pack-action@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signal to gen_pack.sh that lib/<cpu>/libns-cmsis-nn.a is staged
          # so it adds `lib` to PACK_DIRS for the Cvariant="Prebuilt" component.
          NS_CMSIS_NN_PREBUILT_LIBS_STAGED: "1"
        with:
          doxygen-version: 1.9.6
          packchk-version: 1.4.1
          gen-doc-script: ./Documentation/Doxygen/gen_doc.sh
          doc-path: ./Documentation/html
          gen-pack-script: ./gen_pack.sh --no-preprocess
          gen-pack-output: ./output
          gh-pages-branch: ""
          gh-pages-deploy: ""

      - name: Upload pack to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:     ${{ needs.release-please.outputs.tag_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          gh release upload "$TAG" \
            "./output/Ambiq.NS-CMSIS-NN.${VERSION}.pack" \
            --clobber

      - name: Setup Python for docs
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install Sphinx documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build Sphinx site from generated Doxygen XML
        run: bash scripts/docs/build_sphinx_docs.sh --skip-doxygen

      # Publish docs to GitHub Pages (from ./site)
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

  publish-ci-image:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: release-please
    uses: ./.github/workflows/build_publish_docker.yml
    with:
      image_tag: ${{ needs.release-please.outputs.tag_name }}
      publish_latest: true
    secrets: inherit

  release-unit-tests:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs:
      - release-please
      - publish-ci-image
    uses: ./.github/workflows/legacy-tester.yml
    with:
      container_image: ghcr.io/ambiqai/ns-cmsis-nn-ci:${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  release-helia-core-tester:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs:
      - release-please
      - publish-ci-image
    uses: ./.github/workflows/helia-core-tester.yml
    with:
      container_image: ghcr.io/ambiqai/ns-cmsis-nn-ci:${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
