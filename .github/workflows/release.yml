name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write        # tag, releases, uploads
  pull-requests: write   # update/open release PRs
  packages: write        # publish versioned CI images
  pages: write           # publish Pages
  id-token: write        # OIDC for Pages deploy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-22.04
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.ver.outputs.TAG || steps.rp.outputs.tag_name }}
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      # 1) Create/Update Release PR; on merge, tag + create release
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # 2) Only do the rest when a NEW release was created by the step above
      - name: Checkout code
        if: ${{ steps.rp.outputs.release_created }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        if: ${{ steps.rp.outputs.release_created }}
        run: git fetch --tags --force

      - name: Wait for release API to be ready
        if: ${{ steps.rp.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag='${{ steps.rp.outputs.tag_name }}'
          for i in {1..10}; do
            if gh api repos/${{ github.repository }}/releases/tags/"$tag" >/dev/null 2>&1; then
              echo "Release $tag is available."
              exit 0
            fi
            echo "Waiting for release $tag (try $i/10)..."
            sleep 3
          done
          echo "Release $tag not visible to API yet." >&2
          exit 1

      - name: Clean output dir
        if: ${{ steps.rp.outputs.release_created }}
        run: |
          rm -f ./output/*.pack

      - name: PDSC contract pre-flight
        # Cheap fail-fast: if the manifest's identity/version markers drift,
        # don't bother spending several minutes on Doxygen + gen-pack just to
        # ship a broken pack. See M3 #170.
        if: ${{ steps.rp.outputs.release_created }}
        run: python3 scripts/check_pdsc.py

      - name: Generate pack and docs
        if: ${{ steps.rp.outputs.release_created }}
        uses: Open-CMSIS-Pack/gen-pack-action@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACK_CHANGELOG_MODE: full
        with:
          doxygen-version: 1.9.6
          packchk-version: 1.4.1
          gen-doc-script: ./Documentation/Doxygen/gen_doc.sh
          doc-path: ./Documentation/html
          gen-pack-script: ./gen_pack.sh --no-preprocess
          gen-pack-output: ./output
          gh-pages-branch: ""
          gh-pages-deploy: ""

      - name: Compute version
        if: ${{ steps.rp.outputs.release_created }}
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.rp.outputs.tag_name }}'
          version='${{ steps.rp.outputs.version }}'
          if [[ -z "$version" ]]; then
            version="$(printf '%s\n' "$tag" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          fi
          echo "TAG=$tag" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"

      - name: Upload pack to GitHub Release
        if: ${{ steps.rp.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ steps.ver.outputs.TAG }}" \
            "./output/Ambiq.NS-CMSIS-NN.${{ steps.ver.outputs.VERSION }}.pack" \
            --clobber

      # 3) Publish docs to GitHub Pages (from ./Documentation/html)
      - name: Setup Pages
        if: ${{ steps.rp.outputs.release_created }}
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: ${{ steps.rp.outputs.release_created }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./Documentation/html

      - name: Deploy to GitHub Pages
        if: ${{ steps.rp.outputs.release_created }}
        id: deploy
        uses: actions/deploy-pages@v5

  publish-staticlibs:
    # Cross-compile cmsis-nn as a static library for cortex-m0 / m4 / m55,
    # smoke-link each, and upload to the GitHub Release. Mirrors M3 #167.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: release-please
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target_cpu: [cortex-m0, cortex-m4, cortex-m55]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install GNU Arm Embedded toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 13.2.Rel1

      - name: Build static library
        env:
          TARGET_CPU: ${{ matrix.target_cpu }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          bash scripts/build_staticlib.sh \
            --target-cpu "$TARGET_CPU" \
            --version    "$VERSION" \
            --outdir     "./output/$TARGET_CPU"

      - name: Smoke-link
        env:
          TARGET_CPU: ${{ matrix.target_cpu }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          lib="./output/${TARGET_CPU}/libns-cmsis-nn-${TARGET_CPU}-${VERSION}.a"
          bash scripts/smoke/smoke_staticlib.sh \
            --target-cpu "$TARGET_CPU" \
            --library    "$lib" \
            --outdir     "./output/${TARGET_CPU}/smoke"

      - name: Build SDK tarball
        env:
          TARGET_CPU: ${{ matrix.target_cpu }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          lib="./output/${TARGET_CPU}/libns-cmsis-nn-${TARGET_CPU}-${VERSION}.a"
          bash scripts/build_sdk_tarball.sh \
            --target-cpu         "$TARGET_CPU" \
            --version            "$VERSION"    \
            --staticlib          "$lib"        \
            --toolchain          gcc           \
            --toolchain-version  13.2.Rel1     \
            --outdir             "./output/${TARGET_CPU}"

      - name: Upload artefacts (cross-job)
        # Pack-prebuilt job (M3 #167 follow-up) downloads these.
        uses: actions/upload-artifact@v4
        with:
          name: ns-cmsis-nn-staticlib-${{ matrix.target_cpu }}
          path: |
            ./output/${{ matrix.target_cpu }}/libns-cmsis-nn-*.a
            ./output/${{ matrix.target_cpu }}/libns-cmsis-nn-*.a.sha256
            ./output/${{ matrix.target_cpu }}/ns-cmsis-nn-*.tar.gz
            ./output/${{ matrix.target_cpu }}/ns-cmsis-nn-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TARGET_CPU: ${{ matrix.target_cpu }}
        run: |
          gh release upload "$TAG" \
            "./output/${TARGET_CPU}/libns-cmsis-nn-${TARGET_CPU}-${VERSION}.a" \
            "./output/${TARGET_CPU}/libns-cmsis-nn-${TARGET_CPU}-${VERSION}.a.sha256" \
            "./output/${TARGET_CPU}/ns-cmsis-nn-${TARGET_CPU}-gcc-${VERSION}.tar.gz" \
            "./output/${TARGET_CPU}/ns-cmsis-nn-${TARGET_CPU}-gcc-${VERSION}.tar.gz.sha256" \
            --clobber

  publish-ci-image:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: release-please
    uses: ./.github/workflows/build_publish_docker.yml
    with:
      image_tag: ${{ needs.release-please.outputs.tag_name }}
      publish_latest: true
    secrets: inherit

  release-unit-tests:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs:
      - release-please
      - publish-ci-image
    uses: ./.github/workflows/legacy-tester.yml
    with:
      container_image: ghcr.io/ambiqai/ns-cmsis-nn-ci:${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  release-helia-core-tester:
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs:
      - release-please
      - publish-ci-image
    uses: ./.github/workflows/helia-core-tester.yml
    with:
      container_image: ghcr.io/ambiqai/ns-cmsis-nn-ci:${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
