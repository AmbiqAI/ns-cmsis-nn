name: Release Assets Single Facade

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch, commit, or tag) to build
        required: true
        type: string
      tag:
        description: Release tag name
        required: false
        type: string
      upload_to_release:
        description: Upload the bundles to the GitHub release
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, commit, or tag) to build
        required: true
        default: main
        type: string
      tag:
        description: Release tag name (required when uploading to Releases)
        required: false
        default: ""
        type: string
      upload_to_release:
        description: Upload the bundles to the GitHub release
        required: false
        default: false
        type: boolean
  pull_request:
    branches:
      - main

jobs:
  release-assets:
    if: ${{ github.event_name != 'pull_request' }}
    uses: ./.github/workflows/release_assets.yml
    with:
      ref: ${{ inputs.ref }}
      tag: ${{ inputs.tag }}
      upload_to_release: ${{ inputs.upload_to_release }}
      visibility_mode: single-facade
      create_draft_release: ${{ github.event_name == 'workflow_dispatch' }}
    secrets: inherit

  release-assets-pr:
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/release_assets.yml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
      upload_to_release: false
      visibility_mode: single-facade
      create_draft_release: false
    secrets: inherit
