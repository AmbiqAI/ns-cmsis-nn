name: Build NS-CMSIS-NN CI Docker Image

on:
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to publish.
        required: false
        default: latest
        type: string
      publish_latest:
        description: Also publish the latest alias.
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish.
        required: false
        default: latest
        type: string
      publish_latest:
        description: Also publish the latest alias.
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '0 16 * * 1' # 8 AM PST every Monday

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/ambiqai/ns-cmsis-nn-ci

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          CALL_IMAGE_TAG: ${{ inputs.image_tag }}
          CALL_PUBLISH_LATEST: ${{ inputs.publish_latest }}
          DISPATCH_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          DISPATCH_PUBLISH_LATEST: ${{ github.event.inputs.publish_latest }}
        run: |
          set -euo pipefail

          # NOTE: In a reusable workflow invoked via `uses:`, github.event_name
          # can reflect the caller's triggering event (e.g. 'push'), not
          # necessarily 'workflow_call'. Manual dispatch still has its own
          # defaults, so handle it before falling back to workflow-call inputs.
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            image_tag="${DISPATCH_IMAGE_TAG:-latest}"
            publish_latest="${DISPATCH_PUBLISH_LATEST:-true}"
          elif [[ -n "${CALL_IMAGE_TAG}" ]]; then
            image_tag="${CALL_IMAGE_TAG}"
            publish_latest="${CALL_PUBLISH_LATEST:-false}"
          elif [[ "${EVENT_NAME}" == "schedule" ]]; then
            image_tag='latest'
            publish_latest='true'
          else
            image_tag='latest'
            publish_latest='false'
          fi

          tags=("${{ env.REGISTRY_IMAGE }}:$image_tag")
          if [[ "$publish_latest" == 'true' && "$image_tag" != 'latest' ]]; then
            tags+=("${{ env.REGISTRY_IMAGE }}:latest")
          fi

          {
            echo 'image_tag='"$image_tag"
            echo 'docker_tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.docker_tags }}
          build-args: |
            NS_CMSIS_NN_TAG=${{ steps.meta.outputs.image_tag }}

      - name: Publish build summary
        if: always()
        shell: bash
        run: |
          {
            echo "### CI image build"
            echo "- platforms: \`linux/amd64, linux/arm64\`"
            echo "- tags:"
            while IFS= read -r tag; do
              [[ -n "$tag" ]] || continue
              echo "  - \`${tag}\`"
            done <<< "${{ steps.meta.outputs.docker_tags }}"
          } >> "$GITHUB_STEP_SUMMARY"

