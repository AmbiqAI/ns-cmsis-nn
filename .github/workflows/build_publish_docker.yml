name: Build NS-CMSIS-NN CI Docker Image

on:
  push:
    tags:
      - 'v*' # triggered by release-please
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ambiqai/ns-cmsis-nn-ci
  HCT_PATH: ghcr.io/ambiqai/helia-core-tester # TODO: replace with actual path

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ns_tag: ${{ steps.meta.outputs.ns_tag }}
      hct_tag: ${{ steps.meta.outputs.hct_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Fetch all tags
        shell: bash
        run: |
          git fetch --force --tags
          git -C "${HCT_PATH}" fetch --force --tags || true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          # Since this runs on tag push, this is the release version
          NS_TAG="${GITHUB_REF_NAME}"

          if [[ -z "${NS_TAG}" ]]; then
            echo "Failed to resolve ns-cmsis-nn tag"
            exit 1
          fi

          # Resolve latest helia-core-tester tag once
          HCT_TAG="$(git -C "${HCT_PATH}" tag --sort=-version:refname | head -n1)"

          if [[ -z "${HCT_TAG}" ]]; then
            echo "Failed to resolve helia-core-tester tag"
            exit 1
          fi

          IMAGE_TAG="${NS_TAG}_hct-${HCT_TAG}"
          IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"

          echo "ns_tag=${NS_TAG}" >> "${GITHUB_OUTPUT}"
          echo "hct_tag=${HCT_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

      - name: Show resolved versions
        run: |
          echo "ns-cmsis-nn tag: ${{ steps.meta.outputs.ns_tag }}"
          echo "helia-core-tester tag: ${{ steps.meta.outputs.hct_tag }}"
          echo "Pinned image tag: ${{ steps.meta.outputs.image_tag }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        shell: bash
        run: |
          set -euo pipefail

          docker build \
            --label org.opencontainers.image.title="ns-cmsis-nn-ci" \
            --label org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.version="${{ steps.meta.outputs.ns_tag }}" \
            --label io.ambiq.ns-cmsis-nn.tag="${{ steps.meta.outputs.ns_tag }}" \
            --label io.ambiq.helia-core-tester.tag="${{ steps.meta.outputs.hct_tag }}" \
            -t "${{ steps.meta.outputs.image_ref }}" \
            -t "${IMAGE_NAME}:latest" \
            -f .devcontainer/Dockerfile .

      - name: Push Docker Image
        run: |
          docker push "${{ steps.meta.outputs.image_ref }}"
          docker push "${IMAGE_NAME}:latest"