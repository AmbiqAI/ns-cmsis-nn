name: Build NS-CMSIS-NN CI Docker Image

on:
  workflow_call:
  workflow_dispatch: # Allow manual triggering
  schedule:
    - cron: '0 16 * * 1' # 8 AM PST every Monday

jobs:
  build-and-push:
    runs-on: ubuntu-latest-md

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ghcr.io/ambiqai/ns-cmsis-nn-ci:latest -f .devcontainer/Dockerfile .

      - name: Push Docker Image
        run: docker push ghcr.io/ambiqai/ns-cmsis-nn-ci:latest
