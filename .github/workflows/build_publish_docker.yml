name: Build NS-CMSIS-NN CI Docker Image

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      source_ref:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR image tag to publish, for example v7.22.0
        required: true
        type: string
      source_ref:
        description: Git ref to build from, for example v7.22.0 or ci-bootstrap-20260402
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref }}
          submodules: recursive

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Fetch helia-core-tester tags
        run: git -C Tests/helia-core-tester fetch --tags origin

      - name: Resolve exact helia-core-tester tag
        id: helia
        shell: bash
        run: |
          set -euo pipefail
          tag="$(git -C Tests/helia-core-tester describe --tags --exact-match)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: ghcr.io/ambiqai/ns-cmsis-nn-ci:${{ inputs.image_tag }}
          build-args: |
            NS_CMSIS_NN_TAG=${{ inputs.image_tag }}
            HELIA_CORE_TESTER_TAG=${{ steps.helia.outputs.tag }}
