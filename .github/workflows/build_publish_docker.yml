name: NS-CMSIS-NN Docker Image

on:
  workflow_call:
    inputs:
      trigger-sha:
        description: Commit SHA or ref to build
        required: false
        type: string
  workflow_dispatch:
    inputs:
      trigger-sha:
        description: Commit SHA or ref to build
        required: false
        default: ""
        type: string
  schedule:
    - cron: '0 16 * * 1'

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.trigger-sha || '' }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/ambiqai/ns-cmsis-nn-ci
  DOCKERFILE: .devcontainer/Dockerfile
  CONTEXT: .

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.trigger-sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bootstrap vcpkg
        run: |
          set -euo pipefail
          VCPKG_ROOT="${RUNNER_TEMP}/vcpkg"

          if [[ ! -x "${VCPKG_ROOT}/vcpkg" ]]; then
            rm -rf "${VCPKG_ROOT}"
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
            "${VCPKG_ROOT}/bootstrap-vcpkg.sh" -disableMetrics
          fi

          export PATH="${VCPKG_ROOT}:${PATH}"
          echo "VCPKG_ROOT=${VCPKG_ROOT}" >> "${GITHUB_ENV}"
          echo "${VCPKG_ROOT}" >> "${GITHUB_PATH}"

          command -v vcpkg >/dev/null
          vcpkg version

      - name: Install Arm tools
        uses: ARM-software/cmsis-actions/vcpkg@v1
        with:
          config: ${{ github.workspace }}/.github/arm/vcpkg-configuration.json

      - name: Resolve armclang root
        id: armclang
        run: |
          set -euo pipefail
          armclang_root="$(bash ci/find_armclang.sh)"
          echo "root=${armclang_root}" >> "${GITHUB_OUTPUT}"
          printf 'Resolved armclang root: %s\n' "${armclang_root}"

      - name: Stage armclang into Docker context
        run: |
          set -euo pipefail
          rm -rf docker/vendor/armclang
          mkdir -p docker/vendor
          cp -a "${{ steps.armclang.outputs.root }}" docker/vendor/armclang

      - name: Stage LLVM-ET-Arm into Docker context
        run: |
          set -euo pipefail
          rm -rf docker/vendor/llvm-et-arm
          mkdir -p docker/vendor/llvm-et-arm

          python3 - <<'PY' > "${RUNNER_TEMP}/llvm-et-arm.env"
          import json
          from pathlib import Path

          metadata = json.loads(Path("ci/toolchains/llvm-et-arm.json").read_text(encoding="utf-8"))
          print(f"LLVM_ET_ARM_URL={metadata['url']}")
          print(f"LLVM_ET_ARM_SHA256={metadata['sha256']}")
          print(f"LLVM_ET_ARM_ARCHIVE={metadata['archive']}")
          PY

          source "${RUNNER_TEMP}/llvm-et-arm.env"
          curl -fsSL "${LLVM_ET_ARM_URL}" -o "${RUNNER_TEMP}/${LLVM_ET_ARM_ARCHIVE}"
          printf '%s  %s\n' "${LLVM_ET_ARM_SHA256}" "${RUNNER_TEMP}/${LLVM_ET_ARM_ARCHIVE}" | sha256sum -c -
          tar -xJf "${RUNNER_TEMP}/${LLVM_ET_ARM_ARCHIVE}" --strip-components=1 -C docker/vendor/llvm-et-arm

      - name: Verify staged toolchain
        run: |
          set -euo pipefail
          test -x docker/vendor/armclang/bin/armclang
          [[ -d docker/vendor/armclang/lib || -d docker/vendor/armclang/include ]]
          test -x docker/vendor/llvm-et-arm/bin/clang
          test -x docker/vendor/llvm-et-arm/bin/llvm-ar
          test -x docker/vendor/llvm-et-arm/bin/llvm-ranlib
          test -x docker/vendor/llvm-et-arm/bin/llvm-strip

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Clean staged armclang
        if: always()
        run: rm -rf docker/vendor/armclang docker/vendor/llvm-et-arm
