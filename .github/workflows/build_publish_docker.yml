name: Build NS-CMSIS-NN CI Docker Image

on:
  workflow_call:
  workflow_dispatch: # Allow manual triggering
  schedule:
    - cron: '0 16 * * 1' # 8 AM PST every Monday

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: echo "tag=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/ambiqai/ns-cmsis-nn-ci:latest \
            -t ghcr.io/ambiqai/ns-cmsis-nn-ci:${{ steps.version.outputs.tag }} \
            -f .devcontainer/Dockerfile .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/ambiqai/ns-cmsis-nn-ci:latest
          docker push ghcr.io/ambiqai/ns-cmsis-nn-ci:${{ steps.version.outputs.tag }}
