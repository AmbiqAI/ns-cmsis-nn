name: Build NS-CMSIS-NN CI Docker Image

on:
  workflow_call:
    inputs:
      ns_tag:
        required: true
        type: string
      helia_tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ns_tag:
        description: NS-CMSIS-NN release tag to publish, for example v7.22.0
        required: true
        type: string
      helia_tag:
        description: Exact helia-core-tester tag baked into the image, for example v0.2.0
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: ghcr.io/ambiqai/ns-cmsis-nn-ci:${{ inputs.ns_tag }}
          build-args: |
            NS_CMSIS_NN_TAG=${{ inputs.ns_tag }}
            HELIA_CORE_TESTER_TAG=${{ inputs.helia_tag }}
