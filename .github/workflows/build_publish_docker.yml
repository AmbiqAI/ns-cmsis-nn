name: NS-CMSIS-NN Docker Image

on:
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to publish.
        required: false
        default: latest
        type: string
      publish_latest:
        description: Also publish the latest alias.
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish.
        required: false
        default: latest
        type: string
      publish_latest:
        description: Also publish the latest alias.
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '0 16 * * 1' # 8 AM PST every Monday

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/ambiqai/ns-cmsis-nn-ci

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap vcpkg
        run: |
          set -euo pipefail
          VCPKG_ROOT="${RUNNER_TEMP}/vcpkg"

          if [[ ! -x "${VCPKG_ROOT}/vcpkg" ]]; then
            rm -rf "${VCPKG_ROOT}"
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
            "${VCPKG_ROOT}/bootstrap-vcpkg.sh" -disableMetrics
          fi

          export PATH="${VCPKG_ROOT}:${PATH}"
          echo "VCPKG_ROOT=${VCPKG_ROOT}" >> "${GITHUB_ENV}"
          echo "${VCPKG_ROOT}" >> "${GITHUB_PATH}"

          command -v vcpkg >/dev/null
          vcpkg version

      - name: Install Arm tools
        uses: ARM-software/cmsis-actions/vcpkg@v1
        with:
          config: .github/arm/vcpkg-configuration.json

      - name: Resolve armclang root
        id: armclang
        run: |
          set -euo pipefail
          armclang_root="$(bash ci/find_armclang.sh)"
          echo "root=${armclang_root}" >> "${GITHUB_OUTPUT}"
          printf 'Resolved armclang root: %s\n' "${armclang_root}"

      - name: Stage armclang into Docker context
        run: |
          set -euo pipefail
          rm -rf docker/vendor/armclang
          mkdir -p docker/vendor
          cp -a "${{ steps.armclang.outputs.root }}" docker/vendor/armclang

      - name: Verify staged toolchain
        run: |
          set -euo pipefail
          test -x docker/vendor/armclang/bin/armclang
          docker/vendor/armclang/bin/armclang --vsn

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          CALL_IMAGE_TAG: ${{ inputs.image_tag }}
          CALL_PUBLISH_LATEST: ${{ inputs.publish_latest }}
          DISPATCH_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          DISPATCH_PUBLISH_LATEST: ${{ github.event.inputs.publish_latest }}
        run: |
          set -euo pipefail

          case "${EVENT_NAME}" in
            workflow_call)
              image_tag="${CALL_IMAGE_TAG:-latest}"
              publish_latest="${CALL_PUBLISH_LATEST:-false}"
              ;;
            workflow_dispatch)
              image_tag="${DISPATCH_IMAGE_TAG:-latest}"
              publish_latest="${DISPATCH_PUBLISH_LATEST:-true}"
              ;;
            schedule)
              image_tag='latest'
              publish_latest='true'
              ;;
            *)
              image_tag='latest'
              publish_latest='false'
              ;;
          esac

          tags=("${{ env.REGISTRY_IMAGE }}:$image_tag")
          if [[ "$publish_latest" == 'true' && "$image_tag" != 'latest' ]]; then
            tags+=("${{ env.REGISTRY_IMAGE }}:latest")
          fi

          {
            echo 'image_tag='"$image_tag"
            echo 'build_args=--build-arg NS_CMSIS_NN_TAG='"$image_tag"
            echo 'docker_tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build Docker Image
        shell: bash
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            tag_args+=(-t "$tag")
          done <<< "${{ steps.meta.outputs.docker_tags }}"

          docker build \
            "${tag_args[@]}" \
            ${{ steps.meta.outputs.build_args }} \
            -f .devcontainer/Dockerfile .

      - name: Push Docker Image
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.docker_tags }}"

      - name: Clean staged armclang
        if: always()
        run: rm -rf docker/vendor/armclang
