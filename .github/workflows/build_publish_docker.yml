name: Build NS-CMSIS-NN CI Docker Image

on:
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to publish.
        required: false
        default: latest
        type: string
      publish_latest:
        description: Also publish the latest alias.
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish.
        required: false
        default: latest
        type: string
      publish_latest:
        description: Also publish the latest alias.
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '0 16 * * 1' # 8 AM PST every Monday

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/ambiqai/ns-cmsis-nn-ci

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image_tag='${{ inputs.image_tag }}'
          publish_latest='${{ inputs.publish_latest }}'

          if [[ -z "$image_tag" ]]; then
            image_tag='latest'
          fi

          tags=("${{ env.REGISTRY_IMAGE }}:$image_tag")
          if [[ "$publish_latest" == 'true' && "$image_tag" != 'latest' ]]; then
            tags+=("${{ env.REGISTRY_IMAGE }}:latest")
          fi

          {
            echo 'image_tag='"$image_tag"
            echo 'build_args=--build-arg NS_CMSIS_NN_TAG='"$image_tag"
            echo 'docker_tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build Docker Image
        shell: bash
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            tag_args+=(-t "$tag")
          done <<< "${{ steps.meta.outputs.docker_tags }}"

          docker build \
            "${tag_args[@]}" \
            ${{ steps.meta.outputs.build_args }} \
            -f .devcontainer/Dockerfile .

      - name: Push Docker Image
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.docker_tags }}"
