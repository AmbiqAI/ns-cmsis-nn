#
# Pack dry-run.
#
# Mirrors the pack-generation half of release.yml WITHOUT requiring an
# actual release-please tag. Lets us exercise gen_pack.sh + Doxygen +
# packchk end-to-end on demand and verify:
#
#   - PDSC contract still holds (scripts/check_pdsc.py).
#   - gen_pack.sh produces exactly one Ambiq.NS-CMSIS-NN.<version>.pack
#     in ./output.
#   - The resulting .pack passes packchk (the gen-pack-action does this
#     internally; we additionally assert the artefact name).
#   - The Cvariant="Prebuilt" component's per-arch libns-cmsis-nn.a
#     files exist (#181) — they're staged from the build-staticlibs job.
#
# Outputs are uploaded as workflow artefacts (NOT to a GitHub Release).
# Triggered manually only — this is a verification path, not a publish path.

name: Pack dry-run

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Synthetic version stamp used when naming the staticlib artefacts (the .pack itself reads its version from the .pdsc)."
        required: true
        default: "0.0.0-dryrun"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-staticlibs:
    name: Build staticlib (${{ matrix.target_cpu }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target_cpu: [cortex-m0, cortex-m4, cortex-m55]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install GNU Arm Embedded toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 13.2.Rel1

      - name: Build static library
        env:
          TARGET_CPU: ${{ matrix.target_cpu }}
          VERSION: ${{ inputs.version }}
        run: |
          bash scripts/build_staticlib.sh \
            --target-cpu "$TARGET_CPU" \
            --version    "$VERSION" \
            --outdir     "./output/$TARGET_CPU"

      - name: Upload staticlib artefact
        uses: actions/upload-artifact@v7
        with:
          name: pack-dryrun-staticlib-${{ matrix.target_cpu }}
          path: ./output/${{ matrix.target_cpu }}/libns-cmsis-nn-*.a
          if-no-files-found: error
          retention-days: 1

  build-pack:
    name: Build pack (no upload)
    needs: build-staticlibs
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Download per-arch staticlib artefacts
        uses: actions/download-artifact@v8
        with:
          path: ./_artifacts
          pattern: pack-dryrun-staticlib-*

      - name: Stage prebuilt archives at lib/<cpu>/libns-cmsis-nn.a
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p ./lib
          for cpu in cortex-m0 cortex-m4 cortex-m55; do
            src="./_artifacts/pack-dryrun-staticlib-${cpu}/libns-cmsis-nn-${cpu}-${VERSION}.a"
            if [[ ! -f "$src" ]]; then
              echo "missing artefact: $src" >&2
              exit 1
            fi
            mkdir -p "./lib/${cpu}"
            cp "$src" "./lib/${cpu}/libns-cmsis-nn.a"
          done
          ls -lR ./lib

      - name: PDSC contract pre-flight
        run: python3 scripts/check_pdsc.py

      - name: Generate pack and docs
        uses: Open-CMSIS-Pack/gen-pack-action@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACK_CHANGELOG_MODE: full
          NS_CMSIS_NN_PREBUILT_LIBS_STAGED: "1"
        with:
          doxygen-version: 1.9.6
          packchk-version: 1.4.1
          gen-doc-script: ./Documentation/Doxygen/gen_doc.sh
          doc-path: ./Documentation/html
          gen-pack-script: ./gen_pack.sh --no-preprocess
          gen-pack-output: ./output
          gh-pages-branch: ""
          gh-pages-deploy: ""

      - name: Verify pack artefact name
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          packs=( ./output/*.pack )
          if (( ${#packs[@]} != 1 )); then
            printf 'expected exactly one pack in ./output, found %d:\n' "${#packs[@]}" >&2
            printf '  %s\n' "${packs[@]}" >&2
            exit 1
          fi
          name="$(basename "${packs[0]}")"
          case "${name}" in
            Ambiq.NS-CMSIS-NN.*.pack)
              echo "OK: ${name}"
              ;;
            *)
              echo "pack name '${name}' does not match Ambiq.NS-CMSIS-NN.*.pack" >&2
              exit 1
              ;;
          esac

      - name: Upload pack artefact
        uses: actions/upload-artifact@v7
        with:
          name: ns-cmsis-nn-pack-dryrun
          path: ./output/*.pack
          if-no-files-found: error
          retention-days: 14
