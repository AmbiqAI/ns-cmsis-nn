name: UnitTest

on:
  workflow_call:
    inputs:
      container_image:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      container_image:
        description: Pinned GHCR image to run in, for example ghcr.io/ambiqai/ns-cmsis-nn-ci:v7.0.1_hct-v0.2.0
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container_image }}

    strategy:
      fail-fast: false
      matrix:
        core:
          - cortex-m0
          - cortex-m4
          - cortex-m55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify per-channel s16 test data is present
        run: |
          grep -R "fc_per_channel_s16" -n Tests/UnitTest/TestCases/TestData

      - name: Restore tests-downloads cache
        id: cache-downloads
        uses: actions/cache@v4
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}
          restore-keys: |
            ${{ runner.os }}-tests-downloads-

      - name: Download deps (internal cache-checks)
        run: |
          cd Tests/UnitTest
          ./build_and_run_tests.sh -rb

      - name: Build & run tests for ${{ matrix.core }}
        run: |
          cd Tests/UnitTest
          ./build_and_run_tests.sh -q -c ${{ matrix.core }}

      - name: Save tests-downloads cache
        if: steps.cache-downloads.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: Tests/UnitTest/downloads
          key: ${{ runner.os }}-tests-downloads-${{ hashFiles('Tests/UnitTest/requirements.txt','Tests/UnitTest/build_and_run_tests.sh') }}