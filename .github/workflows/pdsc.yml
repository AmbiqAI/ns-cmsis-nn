# Simple workflow for checking PDSC
name: Verify that PDSC file is up to date

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_pdsc:
    name: Check PDSC file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check
        run: |
          sh check_pdsc.sh

  pdsc_contract:
    # Wider invariant check than check_pdsc.sh: pack/component identity,
    # version sync across release-please / arm_nn_types.h / pdsc, license
    # plumbing, and every <file> path resolves on disk. See M3 #170.
    name: PDSC contract (identity, versions, files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run contract test
        run: python3 scripts/check_pdsc.py
