#
# Zephyr integration wiring checks. PR-gated, no SDK / no west / no
# cross-compiler required — every check is configure-time CMake or pure
# Python and runs in seconds.
#
# The end-to-end `west build` lives in a separate workflow_dispatch-only
# job (see zephyr-west-build.yml) because it costs a Zephyr SDK pull and
# only proves what the wiring checks here already prove (plus that GCC
# can compile sources the unit tests already exercise).

name: Zephyr Integration

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wiring:
    name: Zephyr wiring (CMake mock)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run zephyr/CMakeLists.txt wiring test
        run: cmake -S cmake/tests/zephyr_wiring -B build/zephyr_wiring

  kconfig:
    name: Zephyr Kconfig contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Kconfig contract test
        run: python3 scripts/check_zephyr_kconfig.py
