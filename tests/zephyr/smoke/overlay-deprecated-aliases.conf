# Deprecated-alias smoke profile: drive the renamed Kconfig symbols via
# their pre-rename names. NS_CMSIS_NN_BASICMATH / STRIDED_SLICE / SVD are
# `select` aliases that pull in the new BASICMATHSNN / STRIDEDSLICE / SVDF
# symbols; if the alias glue breaks, this overlay's build will fail.
CONFIG_NS_CMSIS_NN=y
CONFIG_NS_CMSIS_NN_BASICMATH=y
CONFIG_NS_CMSIS_NN_STRIDED_SLICE=y
CONFIG_NS_CMSIS_NN_SVD=y
