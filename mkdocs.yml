site_name: heliaCORE
site_description: >-
  Ambiq's CMSIS-NN distribution for Apollo silicon — packaged for CMake,
  CMSIS-Pack, Zephyr, and neuralSPOT-X.
site_url: https://ambiqai.github.io/ns-cmsis-nn/
repo_url: https://github.com/AmbiqAI/ns-cmsis-nn
repo_name: AmbiqAI/ns-cmsis-nn
edit_uri: edit/main/docs/
copyright: >-
  Copyright &copy; Ambiq Micro, Inc. •
  Built on Arm CMSIS-NN (Apache-2.0)

theme:
  name: material
  language: en
  # Header mark + browser favicon. The full wordmark is shown on the
  # landing page (with light/dark variants) rather than crowding the header.
  logo: assets/helia-core-icon-white.png
  favicon: assets/helia-core-icon-color.svg
  icon:
    repo: fontawesome/brands/github-alt
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme)"
      primary: cyan
      accent: blue
      toggle:
        icon: material/brightness-auto
        name: Use system theme
    - media: "(prefers-color-scheme: light)"
      primary: cyan
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to light theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark theme
  features:
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.prune
    - navigation.path
    - navigation.footer
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - navigation.indexes
    - navigation.expand
    - content.tabs.link
    - announce.dismiss

extra_css:
  - https://ambiqai.github.io/helia-rt/css/custom.css
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/chart.js
  - javascripts/chart-init.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AmbiqAI
      name: AmbiqAI on GitHub
  generator: false
  # heliaCORE is part of the HELIA family alongside heliaRT and others.
  family:
    - name: heliaRT
      url: https://ambiqai.github.io/helia-rt/
    - name: heliaCORE
      url: https://ambiqai.github.io/ns-cmsis-nn/

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: ["docs", "."]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - tags

nav:
  - Home: index.md
  - Why heliaCORE: why.md
  - Getting Started:
      - getting-started/index.md
      - CMake (find_package): getting-started/cmake.md
      - CMSIS-Pack: getting-started/cmsis-pack.md
      - Zephyr Module: getting-started/zephyr.md
      - neuralSPOT-X: getting-started/neuralspot-x.md
  - Guides:
      - guides/index.md
      - Operator & Kernel Coverage: guides/operator-kernel-coverage.md
      - DSP/MVE Coverage: guides/dsp-mve-coverage.md
      - Versioning & Releases: guides/releases.md
      - Toolchain Pinning: guides/toolchains.md
  - Reference:
      - reference/index.md
      - Doxygen API: reference/doxygen.md
  - Releasing: releasing.md
  - Contributing: contributing.md

# Files that intentionally live under docs/ but should not appear in the nav.
not_in_nav: |
  /assets/README.md
